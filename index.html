<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Escapologists - Tactical Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --primary: #20258C; --bg-petrol: #0a1118; --card: #0f1922; --text: #e0e0e0; 
            --tactical-blue: #3498db; --eni-yellow: #EBF099; --eni-blue: #2076B3; 
            --eni-green: #23991F; --eni-red: #C93110; --hint-gold: #D4AF37;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg-petrol); color: var(--text); 
            display: flex; justify-content: center; align-items: center; height: 100dvh; margin: 0; overflow: hidden;
        }

        .app-container { 
            width: 95%; max-width: 380px; height: 92%; background: var(--card); 
            display: flex; flex-direction: column; position: relative; overflow: hidden; 
            border: 2px solid var(--tactical-blue); border-radius: 25px; 
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); box-sizing: border-box;
        }

        .timer-bar { 
            background: rgba(0,0,0,0.6); padding: 10px 15px; display: none; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid #1a2a36; flex-shrink: 0;
        }
        
        #timer-display { font-family: monospace; font-size: 1.4rem; color: #3498db; font-weight: bold; }

        .timer-controls { display: flex; gap: 6px; }
        .timer-btn { background: #16212b; border: 1px solid #2c3e50; color: white; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 0.6rem; font-weight: bold; }
        .timer-btn#btn-alert.active { background: var(--eni-red); border-color: white; }

        .screen { display: none; flex-direction: column; height: 100%; padding: 15px 20px; box-sizing: border-box; overflow-y: auto; }
        .screen.active { display: flex; }
        
        .mission-header { border: 2px solid var(--primary); border-radius: 20px; padding: 8px; margin-bottom: 12px; background: rgba(32, 37, 140, 0.1); text-align: center; flex-shrink: 0; }
        h1 { color: #fff; font-size: 0.9rem; text-transform: uppercase; margin: 0; }

        .menu-list { display: flex; flex-direction: column; gap: 15px; flex-grow: 1; justify-content: center; }
        .btn-graphic { width: 100%; height: 130px; background-size: cover; background-position: center; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        
        button { padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        button.secondary { background: #16212b; border: 1px solid #2c3e50; margin-top: auto; flex-shrink: 0; }

        select { padding: 8px; border-radius: 8px; background: #0a1118; color: white; border: 1px solid #2c3e50; margin-bottom: 5px; width: 100%; outline: none; }
        label { font-size: 0.6rem; color: #3498db; font-weight: bold; margin-bottom: 2px; text-transform: uppercase; display: block; margin-left: 5px; }
        
        .result-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 12px; margin-top: 5px; border: 1px solid #1a2a36; min-height: 45px; text-align: center; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #bdc3c7; }

        .code-container { display: flex; justify-content: space-between; margin: 8px 0; gap: 5px; }
        .wheel-wrapper { width: 23%; height: 65px; }
        .select-color { width: 100%; height: 100%; border-radius: 10px; font-size: 1.6rem; font-weight: 900; appearance: none; text-align-last: center; border: none; }
        .c-yellow { background: var(--eni-yellow); color: #2c3e50; }
        .c-blue { background: var(--eni-blue); color: #fff; }
        .c-green { background: var(--eni-green); color: #fff; }
        .c-red { background: var(--eni-red); color: #fff; }

        /* Section Indices intégrée */
        .hint-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid #2c3e50; }
        .hint-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 5px; }
        .hint-btn { background: #1a2a36; border: 1px solid var(--hint-gold); color: var(--hint-gold); padding: 8px 2px; font-size: 0.6rem; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="mission-timer" class="timer-bar">
        <div id="timer-display">60:00</div>
        <div class="timer-controls">
            <button id="btn-alert" class="timer-btn" onclick="toggleAlerte()">ALERTE</button>
            <button id="btn-pause" class="timer-btn" onclick="toggleTimer()">PLAY</button>
            <button class="timer-btn" onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <div id="screen-missions" class="screen active">
        <div class="mission-header"><h1>SÉLECTION MISSION</h1></div>
        <div class="menu-list">
            <button onclick="chargerMission('M1')">M1 : Le jardinier Armé</button>
            <button onclick="chargerMission('M2')">M2 : L'amateur Rouge</button>
            <button onclick="chargerMission('M3')">M3 : ft. Belzebuth</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div class="mission-header"><h1 id="mission-title">HUB TACTIQUE</h1></div>
        <div class="menu-list">
            <div class="btn-graphic" style="background-image: url('bouton_action.jpg');" onclick="show('screen-action-perso')"></div>
            <div class="btn-graphic" style="background-image: url('bouton_enigma.jpg');" onclick="show('screen-enigme')"></div>
        </div>
        <button class="secondary" onclick="show('screen-missions')">Quitter</button>
    </div>

    <div id="screen-action-perso" class="screen">
        <div class="mission-header"><h1>ORDRES AGENTS</h1></div>
        <select id="sel-p" onchange="updateAgentVisuals()"></select>
        <select id="sel-a" onchange="toggleItemSelect()"></select>
        <select id="sel-c-perso" onchange="resetItemUsed()"></select>
        <div id="container-item" style="display:none;"><select id="sel-item-used"></select></div>
        <div id="res-perso" class="result-box">En attente...</div>
        <button onclick="runActionPerso()" style="margin-top:10px;">Exécuter</button>
        <button class="secondary" onclick="show('screen-menu')">Retour</button>
    </div>

    <div id="screen-enigme" class="screen">
        <div class="mission-header"><h1>MACHINE À ÉNIGMES</h1></div>
        
        <label>ID Carte / Énigme</label>
        <select id="sel-eni"></select>

        <div class="code-container">
            <div class="wheel-wrapper"><select id="eni-1" class="select-color c-yellow"></select></div>
            <div class="wheel-wrapper"><select id="eni-2" class="select-color c-blue"></select></div>
            <div class="wheel-wrapper"><select id="eni-3" class="select-color c-green"></select></div>
            <div class="wheel-wrapper"><select id="eni-4" class="select-color c-red"></select></div>
        </div>
        
        <button onclick="runEnigme()">Décoder</button>

        <div class="hint-section">
            <label>Besoin d'aide tactique ?</label>
            <div class="hint-grid">
                <button class="hint-btn" onclick="demanderAide(1)">INDICE 1</button>
                <button class="hint-btn" onclick="demanderAide(2)">INDICE 2</button>
                <button class="hint-btn" onclick="demanderAide(3)" style="border-color:var(--eni-red); color:var(--eni-red)">SOLUTION</button>
            </div>
        </div>

        <div id="res-enigme" class="result-box">Analyse prête.</div>
        
        <button class="secondary" onclick="show('screen-menu')">Retour</button>
    </div>
</div>

<script>
    let timeLeft = 3600, alertLeft = 60, timerId = null, isPaused = true, isAlertActive = false;
    let grille = [], grilleAC = [], grilleENI = [], sols = [], aideData = [];
    const persos = ["Banks", "Julia", "Kim", "Murphy", "Stacy"];
    const mapping = {
        "Banks": ["regarder", "Manipuler", "assommer", "Forcer"],
        "Julia": ["regarder", "Manipuler", "faufiler", "déverrouiller"],
        "Kim": ["regarder", "Manipuler", "acrobatie", "lancer"],
        "Murphy": ["regarder", "Manipuler", "soigner", "Médical"],
        "Stacy": ["regarder", "Manipuler", "pirater", "dynamiter"]
    };

    function updateDisplay() {
        const d = document.getElementById('timer-display');
        let t = isAlertActive ? alertLeft : timeLeft;
        d.innerText = `${Math.floor(t/60).toString().padStart(2,'0')}:${(t%60).toString().padStart(2,'0')}`;
    }

    function toggleTimer() {
        if (isPaused) {
            isPaused = false; document.getElementById('btn-pause').innerText = "PAUSE";
            timerId = setInterval(() => { if(timeLeft>0){timeLeft--;updateDisplay();} }, 1000);
        } else { isPaused = true; document.getElementById('btn-pause').innerText = "PLAY"; clearInterval(timerId); }
    }

    function toggleAlerte() {
        isAlertActive = !isAlertActive;
        document.getElementById('btn-alert').classList.toggle('active');
        updateDisplay();
    }

    function resetTimer() { timeLeft = 3600; updateDisplay(); }

    function fetchCSV(url) { return new Promise(r => Papa.parse(url, { download: true, complete: res => r(res.data), error: () => r([]) })); }

    async function chargerMission(id) {
        const data = await Promise.all([
            fetchCSV("grille.csv"), fetchCSV("grille_ac.csv"), 
            fetchCSV(`grille_eni_${id}.csv`), fetchCSV(`solutions_${id}.csv`),
            fetchCSV(`indice_${id}.csv`)
        ]);
        grille = data[0]; grilleAC = data[1]; grilleENI = data[2]; 
        sols = data[3].map(row => ({ code: row[0]?.trim(), expert: row[1]?.trim().toUpperCase(), action: row[2]?.trim(), texte: row[3]?.trim() }));
        aideData = data[4];
        initMenus();
        document.getElementById('mission-title').innerText = "MISSION " + id;
        show('screen-menu');
    }

    function initMenus() {
        const sp = document.getElementById('sel-p'), sc = document.getElementById('sel-c-perso'), siu = document.getElementById('sel-item-used'), se = document.getElementById('sel-eni');
        sp.innerHTML = '<option value="">Agent</option>'; persos.forEach(p => sp.innerHTML += `<option value="${p}">${p}</option>`);
        sc.innerHTML = '<option value="">Objet</option>'; grille.forEach((l, i) => { if(i >= 2 && l[0]) sc.innerHTML += `<option value="${i}">${l[0]}</option>`; });
        siu.innerHTML = '<option value="">Aucun</option>'; grilleAC.forEach((l, i) => { if(i > 0 && l[0]) siu.innerHTML += `<option value="${i}">${l[0]}</option>`; });
        se.innerHTML = '<option value="">-- Choisir Carte --</option>'; grilleENI.forEach(l => { if(l[0]) se.innerHTML += `<option value="${l[0]}">${l[0]}</option>`; });
        ['eni-1', 'eni-2', 'eni-3', 'eni-4'].forEach(id => {
            const el = document.getElementById(id); el.innerHTML = "";
            for(let i=0; i<=9; i++) el.innerHTML += `<option value="${i}">${i}</option>`;
        });
    }

    function demanderAide(niveau) {
        const id = document.getElementById('sel-eni').value;
        const res = document.getElementById('res-enigme');
        if(!id) { res.innerHTML = "Sélectionnez une carte d'abord."; return; }
        const aide = aideData.find(r => r[0] == id);
        res.innerHTML = aide ? (aide[niveau] || "Pas d'indice.") : "Indice non trouvé.";
    }

    function runEnigme() {
        const id = document.getElementById('sel-eni').value, res = document.getElementById('res-enigme');
        if(!id) return;
        const saisi = document.getElementById('eni-1').value + document.getElementById('eni-2').value + document.getElementById('eni-3').value + document.getElementById('eni-4').value;
        const row = grilleENI.find(r => r[0] == id);
        if(row && saisi === row[1]?.toString().trim()) {
            const s = sols.find(x => x.code === row[2]?.toString().trim());
            res.innerHTML = s ? s.texte : "CODE CORRECT.";
        } else { res.innerHTML = "ÉCHEC DU DÉCODAGE."; }
    }

    // Fonctions simplifiées pour l'exemple
    function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('mission-timer').style.display = (id === 'screen-missions') ? 'none' : 'flex'; }
    function updateAgentVisuals() { /* ... */ }
    function toggleItemSelect() { /* ... */ }
    function runActionPerso() { /* ... */ }

    window.onload = () => updateDisplay();
</script>
</body>
</html>
