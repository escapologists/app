<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Escapologists - Tactical Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --primary: #20258C; --bg-petrol: #0a1118; --card: #0f1922; --text: #e0e0e0; 
            --halo: rgba(32, 37, 140, 0.5); --eni-yellow: #EBF099; --eni-blue: #2076B3; 
            --eni-green: #23991F; --eni-red: #C93110; --hint-color: #419096;
            --tactical-blue: #3498db;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-petrol); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100dvh; margin: 0; overflow: hidden; }

        .app-container { 
            width: 100%; max-width: 380px; height: 100%; background: var(--card); 
            display: flex; flex-direction: column; position: relative; overflow: hidden; 
            border: 2px solid var(--tactical-blue); border-radius: 25px; box-shadow: 0 0 15px rgba(52, 152, 219, 0.4);
        }

        .timer-bar { background: rgba(0,0,0,0.4); padding: 10px 12px; display: none; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a2a36; }
        #timer-display { font-family: monospace; font-size: 1.3rem; color: #3498db; font-weight: bold; }
        #timer-display.alert-mode { color: var(--eni-red); animation: blink 0.8s infinite; }
        #timer-display.danger { color: var(--eni-red); }

        .timer-controls { display: flex; gap: 5px; }
        .timer-btn { background: #16212b; border: 1px solid #2c3e50; color: white; padding: 6px 8px; border-radius: 5px; cursor: pointer; font-size: 0.65rem; font-weight: bold; }
        .timer-btn#btn-alert.active { background: var(--eni-red); border-color: white; color: white; }

        .screen { display: none; flex-direction: column; height: 100%; padding: 15px 20px; box-sizing: border-box; overflow-y: auto; }
        .screen.active { display: flex; }
        .mission-header { border: 2px solid var(--primary); border-radius: 20px; padding: 8px 18px; margin-bottom: 15px; background: rgba(32, 37, 140, 0.1); text-align: center; }
        h1 { color: #fff; font-size: 1rem; text-transform: uppercase; margin: 0; letter-spacing: 1px; }

        .menu-list { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; justify-content: center; }
        .btn-graphic { width: 100%; height: 130px; background-size: cover; background-position: center; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        
        button { padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        button.secondary { background: #16212b; border: 1px solid #2c3e50; margin-top: auto; }

        select { padding: 10px; border-radius: 10px; background: #0a1118; color: white; border: 1px solid #2c3e50; margin-bottom: 6px; width: 100%; outline: none; }
        label { font-size: 0.6rem; color: #3498db; font-weight: bold; margin-bottom: 3px; text-transform: uppercase; display: block; }
        .result-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 12px; margin-top: 8px; border: 1px solid #1a2a36; min-height: 55px; text-align: center; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: #bdc3c7; }

        .agent-avatar-container { width: 80px; height: 80px; margin: 0 auto 8px auto; border-radius: 50%; border: 2px solid var(--primary); background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #agent-avatar { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* --- STYLES ÉNIGME RÉTABLIS --- */
        .code-container { display: flex; justify-content: space-between; margin: 10px 0; gap: 6px; flex-shrink: 0; }
        .wheel-wrapper { position: relative; width: 68px; height: 75px; }
        .select-color { width: 100%; height: 100%; border-radius: 12px; font-size: 1.8rem; font-weight: 900; appearance: none; text-align-last: center; border: none; cursor: pointer; }
        .c-yellow { background-color: var(--eni-yellow); color: #2c3e50; }
        .c-blue { background-color: var(--eni-blue); color: #fff; }
        .c-green { background-color: var(--eni-green); color: #fff; }
        .c-red { background-color: var(--eni-red); color: #fff; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="mission-timer" class="timer-bar">
        <div id="timer-display">60:00</div>
        <div class="timer-controls">
            <button id="btn-alert" class="timer-btn" style="color:var(--eni-red)" onclick="toggleAlerte()">ALERTE</button>
            <button id="btn-pause" class="timer-btn" onclick="toggleTimer()">PLAY</button>
            <button class="timer-btn" onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <div id="screen-missions" class="screen active">
        <div class="mission-header"><h1>SÉLECTION MISSION</h1></div>
        <div class="menu-list">
            <button onclick="chargerMission('M1')">M1 : Le jardinier Armé</button>
            <button onclick="chargerMission('M2')">M2 : L'amateur Rouge</button>
            <button onclick="chargerMission('M3')">M3 : ft. Belzebuth</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div class="mission-header"><h1 id="mission-title">MISSION</h1></div>
        <div class="menu-list">
            <button class="btn-graphic" style="background-image: url('bouton_action.jpg');" onclick="show('screen-action-perso')"></button>
            <button class="btn-graphic" style="background-image: url('bouton_enigma.jpg');" onclick="show('screen-enigme')"></button>
        </div>
        <button class="secondary" onclick="show('screen-missions')">Quitter</button>
    </div>

    <div id="screen-action-perso" class="screen">
        <h1>Action Agent</h1>
        <div class="agent-avatar-container">
            <img id="agent-avatar" src="">
            <div id="avatar-none" style="font-size: 2.2rem; color: #3498db; font-weight: bold;">?</div>
        </div>
        <label>Agent</label><select id="sel-p" onchange="updateAgentVisuals()"></select>
        <label>Action</label><select id="sel-a" onchange="toggleItemSelect()"></select>
        <label>Objet Principal</label><select id="sel-c-perso" onchange="resetItemUsed()"></select>
        <div id="container-item" style="display:none;">
            <label>Associé à :</label><select id="sel-item-used"></select>
        </div>
        <div id="res-perso" class="result-box">En attente d'ordres...</div>
        <button onclick="runActionPerso()" style="margin-top:8px;">Exécuter</button>
        <button class="secondary" onclick="show('screen-menu')">Retour</button>
    </div>

    <div id="screen-enigme" class="screen">
        <h1>Cryptographie</h1>
        <label>ID Énigme</label><select id="sel-eni"></select>
        
        <div class="code-container">
            <div class="wheel-wrapper"><select id="eni-1" class="select-color c-yellow"></select></div>
            <div class="wheel-wrapper"><select id="eni-2" class="select-color c-blue"></select></div>
            <div class="wheel-wrapper"><select id="eni-3" class="select-color c-green"></select></div>
            <div class="wheel-wrapper"><select id="eni-4" class="select-color c-red"></select></div>
        </div>

        <div id="res-enigme" class="result-box">Saisissez la séquence.</div>
        <button onclick="runEnigme()" style="margin-top:8px;">Décoder</button>
        <button class="secondary" onclick="show('screen-menu')">Retour</button>
    </div>
</div>

<script>
    let timeLeft = 3600, alertLeft = 60, timerId = null, isPaused = true, isAlertActive = false;
    let grille = [], grilleAC = [], grilleENI = [], sols = [];
    const persos = ["Banks", "Julia", "Kim", "Murphy", "Stacy"];
    const mapping = {
        "Banks": ["regarder", "Manipuler", "assommer", "Forcer"],
        "Julia": ["regarder", "Manipuler", "faufiler", "déverrouiller"],
        "Kim": ["regarder", "Manipuler", "acrobatie", "lancer"],
        "Murphy": ["regarder", "Manipuler", "soigner", "Médical"],
        "Stacy": ["regarder", "Manipuler", "pirater", "dynamiter"]
    };
    const actionsWithItems = ["Manipuler", "Forcer", "déverrouiller", "lancer", "soigner", "dynamiter"];

    const sndAlarm = new Audio('alarm.wav'); sndAlarm.loop = false;
    const sndSuccess = new Audio('success.wav');
    const sndError = new Audio('error.wav');

    function updateDisplay() {
        const display = document.getElementById('timer-display');
        let t = isAlertActive ? alertLeft : timeLeft;
        const m = Math.floor(t / 60), s = t % 60;
        display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        if (isAlertActive) display.classList.add('alert-mode'); 
        else {
            display.classList.remove('alert-mode');
            if(timeLeft < 300) display.classList.add('danger'); else display.classList.remove('danger');
        }
    }

    function toggleTimer() {
        if (isAlertActive) return;
        const btnP = document.getElementById('btn-pause');
        if (isPaused) {
            isPaused = false; btnP.innerText = "PAUSE";
            timerId = setInterval(() => {
                if (timeLeft > 0) { timeLeft--; updateDisplay(); } 
                else { clearInterval(timerId); sndAlarm.play(); }
            }, 1000);
        } else {
            isPaused = true; btnP.innerText = "PLAY"; clearInterval(timerId);
        }
    }

    function toggleAlerte() {
        const btnA = document.getElementById('btn-alert');
        const btnP = document.getElementById('btn-pause');
        if (!isAlertActive) {
            isAlertActive = true; clearInterval(timerId);
            alertLeft = 60; btnA.classList.add('active'); btnP.disabled = true;
            timerId = setInterval(() => {
                if (alertLeft > 0) { alertLeft--; updateDisplay(); } 
                else { clearInterval(timerId); sndAlarm.play(); }
            }, 1000);
        } else {
            isAlertActive = false; clearInterval(timerId);
            btnA.classList.remove('active'); btnP.disabled = false;
            if (!isPaused) {
                timerId = setInterval(() => {
                    if (timeLeft > 0) { timeLeft--; updateDisplay(); } else { clearInterval(timerId); sndAlarm.play(); }
                }, 1000);
            }
            updateDisplay();
        }
    }

    function resetTimer() {
        clearInterval(timerId); isPaused = true; isAlertActive = false;
        timeLeft = 3600; alertLeft = 60; sndAlarm.pause(); sndAlarm.currentTime = 0;
        document.getElementById('btn-pause').innerText = "PLAY";
        document.getElementById('btn-pause').disabled = false;
        document.getElementById('btn-alert').classList.remove('active');
        updateDisplay();
    }

    function fetchCSV(url) { return new Promise(r => Papa.parse(url, { download: true, complete: res => r(res.data) })); }

    async function chargerMission(id) {
        const data = await Promise.all([
            fetchCSV("grille.csv"), fetchCSV("grille_ac.csv"), 
            fetchCSV(`grille_eni_${id}.csv`), fetchCSV(`solutions_${id}.csv`)
        ]);
        grille = data[0]; grilleAC = data[1]; grilleENI = data[2]; 
        sols = data[3].map(row => ({ code: row[0]?.trim(), expert: row[1]?.trim().toUpperCase(), action: row[2]?.trim(), texte: row[3]?.trim() }));
        initMenus();
        document.getElementById('mission-title').innerText = "MISSION " + id;
        show('screen-menu');
    }

    function initMenus() {
        const sp = document.getElementById('sel-p'), sc = document.getElementById('sel-c-perso'), siu = document.getElementById('sel-item-used'), se = document.getElementById('sel-eni');
        sp.innerHTML = '<option value="">-- Agent --</option>';
        persos.forEach(p => sp.innerHTML += `<option value="${p}">${p}</option>`);
        sc.innerHTML = '<option value="">-- Objet --</option>';
        grille.forEach((l, i) => { if(i >= 2 && l[0]) sc.innerHTML += `<option value="${i}">${l[0]}</option>`; });
        siu.innerHTML = '<option value="">-- Aucun --</option>';
        grilleAC.forEach((l, i) => { if(i > 0 && l[0]) siu.innerHTML += `<option value="${i}">${l[0]}</option>`; });
        se.innerHTML = '<option value="">-- Énigme --</option>';
        grilleENI.forEach(l => { if(l[0]) se.innerHTML += `<option value="${l[0]}">${l[0]}</option>`; });

        // Initialisation des roues de couleurs 0-9
        ['eni-1', 'eni-2', 'eni-3', 'eni-4'].forEach(id => {
            const el = document.getElementById(id);
            el.innerHTML = "";
            for(let i=0; i<=9; i++) el.innerHTML += `<option value="${i}">${i}</option>`;
        });
    }

    function updateAgentVisuals() {
        const p = document.getElementById('sel-p').value, img = document.getElementById('agent-avatar'), ph = document.getElementById('avatar-none'), sa = document.getElementById('sel-a');
        if (p) { 
            img.src = `${p}.png`; img.style.display = 'block'; ph.style.display = 'none'; 
            sa.innerHTML = ''; mapping[p].forEach((act, i) => sa.innerHTML += `<option value="${i}">${act}</option>`);
        } else { img.style.display = 'none'; ph.style.display = 'block'; }
    }

    function toggleItemSelect() {
        const sa = document.getElementById('sel-a'), cont = document.getElementById('container-item');
        cont.style.display = (sa.options[sa.selectedIndex] && actionsWithItems.includes(sa.options[sa.selectedIndex].text)) ? "block" : "none";
    }

    function resetItemUsed() { document.getElementById('sel-item-used').selectedIndex = 0; }

    function runActionPerso() {
        const agentName = document.getElementById('sel-p').value, obj1Idx = document.getElementById('sel-c-perso').value, obj2Idx = document.getElementById('sel-item-used').value, resBox = document.getElementById('res-perso'), sa = document.getElementById('sel-a');
        if(!agentName || !obj1Idx || !sa.options[sa.selectedIndex]) return;
        
        let actionLabel = sa.options[sa.selectedIndex].text, code = "";

        if(actionsWithItems.includes(actionLabel) && obj2Idx !== "0" && obj2Idx !== "") {
            const name1 = grille[obj1Idx][0].trim(), name2 = grilleAC[obj2Idx][0].trim();
            let rA = grilleAC.findIndex(r => r[0]?.trim() === name1), cA = grilleAC[0].findIndex(c => c?.trim() === name2);
            if(rA !== -1 && cA !== -1) code = grilleAC[rA][cA]?.trim();
            if(!code) {
                let rB = grilleAC.findIndex(r => r[0]?.trim() === name2), cB = grilleAC[0].findIndex(c => c?.trim() === name1);
                if(rB !== -1 && cB !== -1) code = grilleAC[rB][cB]?.trim();
            }
        } 
        if (!code) {
            const agentIdx = persos.indexOf(agentName), colIndex = 1 + (agentIdx * 4) + parseInt(sa.value);
            code = grille[obj1Idx][colIndex]?.trim();
        }

        const agentInit = agentName[0].toUpperCase();
        const match = sols.find(s => s.code === code && (s.expert === "" || s.expert === agentInit) && (s.action === "" || s.action.toLowerCase() === actionLabel.toLowerCase()));

        if(match) { resBox.innerHTML = match.texte; sndSuccess.play(); }
        else { resBox.innerHTML = code ? "Inadapté ici." : "Rien ne se passe."; sndError.play(); }
    }

    function runEnigme() {
        const id = document.getElementById('sel-eni').value, res = document.getElementById('res-enigme');
        if(!id) return;
        const saisi = document.getElementById('eni-1').value + document.getElementById('eni-2').value + document.getElementById('eni-3').value + document.getElementById('eni-4').value;
        const row = grilleENI.find(r => r[0] == id);
        if(row && saisi === row[1]?.toString().trim()) {
            const s = sols.find(x => x.code === row[2]?.toString().trim());
            res.innerHTML = s ? s.texte : "Séquence correcte."; sndSuccess.play();
        } else { res.innerHTML = "Échec du décodage."; sndError.play(); }
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('mission-timer').style.display = (id === 'screen-missions') ? 'none' : 'flex';
    }

    window.onload = () => updateDisplay();
</script>
</body>
</html>
