<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Escapologists - Tactical Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --primary: #20258C; --bg-petrol: #0a1118; --card: #0f1922; --text: #e0e0e0; 
            --tactical-blue: #3498db; --eni-yellow: #EBF099; --eni-blue: #2076B3; 
            --eni-green: #23991F; --eni-red: #C93110; --hint-gold: #D4AF37;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg-petrol); color: var(--text); 
            display: flex; justify-content: center; align-items: center; height: 100dvh; margin: 0; overflow: hidden;
        }

        .app-container { 
            width: 95%; max-width: 380px; height: 90%; background: var(--card); 
            display: flex; flex-direction: column; position: relative; overflow: hidden; 
            border: 2px solid var(--tactical-blue); border-radius: 20px; 
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); box-sizing: border-box;
        }

        .timer-bar { 
            background: rgba(0,0,0,0.7); padding: 12px 15px; display: none; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--tactical-blue); flex-shrink: 0;
        }
        
        #timer-display { font-family: 'Courier New', monospace; font-size: 1.5rem; color: var(--tactical-blue); font-weight: bold; }

        .timer-controls { display: flex; gap: 8px; }
        .timer-btn { background: #16212b; border: 1px solid #2c3e50; color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.65rem; font-weight: bold; }

        .screen { display: none; flex-direction: column; height: 100%; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .screen.active { display: flex; }
        
        .mission-header { border: 2px solid var(--primary); border-radius: 15px; padding: 8px; margin-bottom: 15px; background: rgba(32, 37, 140, 0.2); text-align: center; }
        h1 { color: #fff; font-size: 0.9rem; text-transform: uppercase; margin: 0; }

        .menu-list { display: flex; flex-direction: column; gap: 15px; flex-grow: 1; justify-content: center; }
        .btn-graphic { width: 100%; height: 140px; background-size: cover; background-position: center; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
        
        button { padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; }
        button.secondary { background: #16212b; border: 1px solid #2c3e50; margin-top: auto; }

        label { font-size: 0.7rem; color: var(--tactical-blue); font-weight: bold; margin-bottom: 4px; text-transform: uppercase; display: block; margin-left: 5px; }
        select { padding: 10px; border-radius: 10px; background: #0a1118; color: white; border: 1px solid #2c3e50; margin-bottom: 10px; width: 100%; font-size: 0.9rem; }

        /* Zones de résultats distinctes */
        .result-code { background: rgba(0,0,0,0.8); padding: 12px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--tactical-blue); color: #fff; text-align: center; font-weight: bold; min-height: 20px; }
        
        .hint-scroll-area { background: rgba(0,0,0,0.4); border: 1px solid #1a2a36; border-radius: 10px; padding: 10px; flex-grow: 1; overflow-y: auto; margin-top: 10px; font-size: 0.85rem; }
        .hint-entry { border-left: 3px solid var(--hint-gold); padding-left: 10px; margin-bottom: 12px; animation: fadeIn 0.4s ease; }
        .hint-label { font-size: 0.65rem; color: var(--hint-gold); font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }

        .code-container { display: flex; justify-content: space-between; margin: 10px 0; gap: 5px; }
        .wheel-wrapper { width: 23%; height: 60px; }
        .select-color { width: 100%; height: 100%; border-radius: 10px; font-size: 1.8rem; font-weight: 900; appearance: none; text-align-last: center; border: none; }
        .c-yellow { background: var(--eni-yellow); color: #2c3e50; }
        .c-blue { background: var(--eni-blue); color: #fff; }
        .c-green { background: var(--eni-green); color: #fff; }
        .c-red { background: var(--eni-red); color: #fff; }

        .btn-hint-main { background: #1a2a36; border: 1px solid var(--hint-gold); color: var(--hint-gold); width: 100%; margin-top: 5px; }
        .btn-hint-main:disabled { opacity: 0.5; border-color: #444; color: #777; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="mission-timer" class="timer-bar">
        <div id="timer-display">60:00</div>
        <div class="timer-controls">
            <button class="timer-btn" onclick="toggleTimer()" id="btn-pause">Play</button>
            <button class="timer-btn" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <div id="screen-missions" class="screen active">
        <div class="mission-header"><h1>SÉLECTION MISSION</h1></div>
        <div class="menu-list">
            <button onclick="chargerMission('M1')">M1 : Le jardinier Armé</button>
            <button onclick="chargerMission('M2')">M2 : L'amateur Rouge</button>
            <button onclick="chargerMission('M3')">M3 : ft. Belzebuth</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div class="mission-header"><h1 id="mission-title">HUB TACTIQUE</h1></div>
        <div class="menu-list">
            <div class="btn-graphic" style="background-image: url('bouton_action.jpg');" onclick="show('screen-action-perso')"></div>
            <div class="btn-graphic" style="background-image: url('bouton_enigma.jpg');" onclick="show('screen-enigme')"></div>
        </div>
        <button class="secondary" onclick="show('screen-missions')">Retour</button>
    </div>

    <div id="screen-action-perso" class="screen">
        <div class="mission-header"><h1>ACTIONS</h1></div>
        <select id="sel-p" onchange="updateAgentVisuals()"></select>
        <select id="sel-a" onchange="toggleItemSelect()"></select>
        <select id="sel-c-perso"></select>
        <div id="res-perso" class="result-code">...</div>
        <button onclick="runActionPerso()" style="margin-top:10px;">Exécuter</button>
        <button class="secondary" onclick="show('screen-menu')">Retour</button>
    </div>

    <div id="screen-enigme" class="screen">
        <div class="mission-header"><h1>DÉCODEUR</h1></div>
        
        <label>Sélectionner l'énigme</label>
        <select id="sel-eni" onchange="resetHintsForNewEnigma()"></select>
        
        <div class="code-container">
            <div class="wheel-wrapper"><select id="eni-1" class="select-color c-yellow"></select></div>
            <div class="wheel-wrapper"><select id="eni-2" class="select-color c-blue"></select></div>
            <div class="wheel-wrapper"><select id="eni-3" class="select-color c-green"></select></div>
            <div class="wheel-wrapper"><select id="eni-4" class="select-color c-red"></select></div>
        </div>
        
        <button onclick="runEnigme()">Tester le code</button>
        <div id="res-code-final" class="result-code">EN ATTENTE DE SAISIE</div>

        <button id="btn-next-hint" class="btn-hint-main" onclick="progressiveHint()">Demander Indice 1</button>
        
        <div class="hint-scroll-area" id="hint-journal">
            <div style="color:#555; text-align:center; font-style:italic; font-size: 0.7rem;">Journal d'assistance tactique vide.</div>
        </div>

        <button class="secondary" onclick="show('screen-menu')">Retour</button>
    </div>
</div>

<script>
    let timeLeft = 3600, timerId = null, isPaused = true;
    let grille = [], grilleAC = [], grilleENI = [], sols = [], aideData = [];
    let currentHintLevel = 1;

    function updateDisplay() {
        const d = document.getElementById('timer-display');
        d.innerText = `${Math.floor(timeLeft/60).toString().padStart(2,'0')}:${(timeLeft%60).toString().padStart(2,'0')}`;
    }

    function toggleTimer() {
        if (isPaused) {
            isPaused = false; document.getElementById('btn-pause').innerText = "PAUSE";
            timerId = setInterval(() => { if(timeLeft>0){timeLeft--;updateDisplay();} }, 1000);
        } else { isPaused = true; document.getElementById('btn-pause').innerText = "PLAY"; clearInterval(timerId); }
    }

    function resetTimer() { timeLeft = 3600; updateDisplay(); }

    function fetchCSV(url) { return new Promise(r => Papa.parse(url, { download: true, complete: res => r(res.data), error: () => r([]) })); }

    async function chargerMission(id) {
        const data = await Promise.all([
            fetchCSV("grille.csv"), fetchCSV("grille_ac.csv"), 
            fetchCSV(`grille_eni_${id}.csv`), fetchCSV(`solutions_${id}.csv`),
            fetchCSV(`indice_${id}.csv`)
        ]);
        grille = data[0]; grilleAC = data[1]; grilleENI = data[2]; 
        sols = data[3].map(row => ({ code: row[0]?.trim(), expert: row[1]?.trim().toUpperCase(), action: row[2]?.trim(), texte: row[3]?.trim() }));
        aideData = data[4];
        initMenus();
        document.getElementById('mission-title').innerText = "MISSION " + id;
        show('screen-menu');
    }

    function initMenus() {
        const se = document.getElementById('sel-eni');
        se.innerHTML = '<option value="">-- Choisir Enigme --</option>';
        grilleENI.forEach(l => { if(l[0]) se.innerHTML += `<option value="${l[0]}">${l[0]}</option>`; });
        ['eni-1', 'eni-2', 'eni-3', 'eni-4'].forEach(id => {
            const el = document.getElementById(id); el.innerHTML = "";
            for(let i=0; i<=9; i++) el.innerHTML += `<option value="${i}">${i}</option>`;
        });
        // Initialiser aussi les menus agents (simplifié)
        const sp = document.getElementById('sel-p');
        sp.innerHTML = '<option value="">Agent</option>';
        ["Banks", "Julia", "Kim", "Murphy", "Stacy"].forEach(p => sp.innerHTML += `<option value="${p}">${p}</option>`);
    }

    // Reset de la zone d'indice quand on change d'énigme
    function resetHintsForNewEnigma() {
        currentHintLevel = 1;
        const btn = document.getElementById('btn-next-hint');
        btn.innerText = "Demander Indice 1";
        btn.disabled = false;
        document.getElementById('hint-journal').innerHTML = '<div style="color:#555; text-align:center; font-style:italic; font-size: 0.7rem;">Journal d\'assistance tactique vide.</div>';
        document.getElementById('res-code-final').innerText = "EN ATTENTE DE SAISIE";
    }

    function progressiveHint() {
        const enigmaId = document.getElementById('sel-eni').value;
        const journal = document.getElementById('hint-journal');
        const btn = document.getElementById('btn-next-hint');

        if(!enigmaId) { alert("Sélectionnez une énigme d'abord."); return; }

        const hint = aideData.find(r => r[0].trim() == enigmaId && r[1].trim() == currentHintLevel);

        if(hint) {
            // Supprimer le message "vide" au premier indice
            if(currentHintLevel === 1) journal.innerHTML = "";

            // Créer l'entrée
            const div = document.createElement('div');
            div.className = 'hint-entry';
            const labelText = currentHintLevel === 3 ? "SOLUTION FINALE" : `INDICE ${currentHintLevel}`;
            div.innerHTML = `<div class="hint-label">${labelText}</div><div>${hint[2]}</div>`;
            journal.appendChild(div);
            journal.scrollTop = journal.scrollHeight;

            // Appliquer pénalité
            const pen = parseInt(hint[3]);
            if(!isNaN(pen) && pen > 0) {
                timeLeft = Math.max(0, timeLeft - (pen * 60));
                updateDisplay();
            }

            // Préparer niveau suivant
            currentHintLevel++;
            if(currentHintLevel > 3) {
                btn.innerText = "Plus d'aide disponible";
                btn.disabled = true;
            } else {
                btn.innerText = currentHintLevel === 3 ? "Demander SOLUTION" : `Demander Indice ${currentHintLevel}`;
            }
        }
    }

    function runEnigme() {
        const id = document.getElementById('sel-eni').value;
        const res = document.getElementById('res-code-final');
        if(!id) return;
        const saisi = document.getElementById('eni-1').value + document.getElementById('eni-2').value + document.getElementById('eni-3').value + document.getElementById('eni-4').value;
        const row = grilleENI.find(r => r[0] == id);
        
        if(row && saisi === row[1]?.toString().trim()) {
            const s = sols.find(x => x.code === row[2]?.toString().trim());
            res.innerHTML = s ? s.texte : "CODE CORRECT.";
            res.style.color = "var(--eni-green)";
        } else { 
            res.innerHTML = "ÉCHEC DU DÉCODAGE"; 
            res.style.color = "var(--eni-red)";
        }
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('mission-timer').style.display = (id === 'screen-missions') ? 'none' : 'flex';
    }

    // Fonctions agents minimales pour éviter erreurs JS
    function updateAgentVisuals() { /* ... */ }
    function toggleItemSelect() { /* ... */ }
    function runActionPerso() { /* ... */ }

    window.onload = () => updateDisplay();
</script>
</body>
</html>
