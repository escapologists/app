<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Escapologists - Tactical Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --primary: #20258C; --bg-petrol: #0a1118; --card: #0f1922; --text: #e0e0e0; 
            --tactical-blue: #3498db; --eni-yellow: #EBF099; --eni-blue: #2076B3; 
            --eni-green: #23991F; --eni-red: #C93110; --hint-gold: #D4AF37;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-petrol); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100dvh; margin: 0; overflow: hidden; }
        .app-container { width: 95%; max-width: 380px; height: 92%; background: var(--card); display: flex; flex-direction: column; position: relative; border: 2px solid var(--tactical-blue); border-radius: 20px; box-sizing: border-box; overflow: hidden; }
        
        .timer-bar { background: rgba(0,0,0,0.8); padding: 12px; display: none; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--tactical-blue); }
        #timer-display { font-family: 'Courier New', monospace; font-size: 1.6rem; color: var(--tactical-blue); font-weight: bold; }
        #timer-display.alert-mode { color: var(--eni-red); text-shadow: 0 0 10px var(--eni-red); }
        .timer-controls { display: flex; gap: 5px; }
        .timer-btn { background: #16212b; border: 1px solid #2c3e50; color: white; padding: 5px 8px; border-radius: 5px; cursor: pointer; font-size: 0.6rem; font-weight: bold; }
        .timer-btn.active { background: var(--eni-red) !important; color: white; }

        .screen { display: none; flex-direction: column; height: 100%; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .screen.active { display: flex; }
        .mission-header { border: 2px solid var(--primary); border-radius: 12px; padding: 8px; margin-bottom: 15px; background: rgba(32, 37, 140, 0.2); text-align: center; }
        h1 { font-size: 0.9rem; margin: 0; text-transform: uppercase; color: #fff; }

        .menu-list { display: flex; flex-direction: column; gap: 15px; flex-grow: 1; justify-content: center; }
        .btn-graphic { width: 100%; height: 130px; background-size: cover; background-position: center; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        
        button { padding: 12px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button.secondary { background: #16212b; border: 1px solid #2c3e50; margin-top: auto; font-size: 0.8rem; }

        label { font-size: 0.65rem; color: var(--tactical-blue); font-weight: bold; display: block; margin: 5px 0 2px 5px; text-transform: uppercase; }
        select { padding: 10px; border-radius: 8px; background: #0a1118; color: white; border: 1px solid #2c3e50; width: 100%; margin-bottom: 8px; font-size: 0.9rem; }

        .agent-avatar-container { width: 70px; height: 70px; margin: 0 auto 10px auto; border-radius: 50%; border: 3px solid var(--primary); background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #agent-avatar { width: 100%; height: 100%; object-fit: cover; }

        .result-box { background: rgba(0,0,0,0.6); padding: 12px; border-radius: 10px; margin: 10px 0; border: 1px solid #1a2a36; min-height: 45px; text-align: center; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; line-height: 1.2; }
        
        .hint-scroll-area { background: rgba(0,0,0,0.3); border: 1px solid #1a2a36; border-radius: 10px; padding: 10px; flex-grow: 1; overflow-y: auto; margin-top: 10px; font-size: 0.8rem; }
        .hint-entry { border-left: 3px solid var(--hint-gold); padding-left: 10px; margin-bottom: 10px; }
        .hint-label { font-size: 0.6rem; color: var(--hint-gold); font-weight: bold; }

        .code-container { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 10px; }
        .wheel-wrapper { width: 23%; height: 50px; }
        .select-color { width: 100%; height: 100%; border-radius: 8px; font-size: 1.5rem; font-weight: bold; text-align-last: center; border: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="mission-timer" class="timer-bar">
        <div id="timer-display">60:00</div>
        <div class="timer-controls">
            <button id="btn-alert" class="timer-btn" onclick="toggleAlerte()">Alerte</button>
            <button id="btn-pause" class="timer-btn" onclick="toggleTimer()">Play</button>
            <button class="timer-btn" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <div id="screen-missions" class="screen active">
        <div class="mission-header"><h1>SÉLECTION MISSION</h1></div>
        <div class="menu-list">
            <button onclick="chargerMission('M1')">M1 : Le jardinier Armé</button>
            <button onclick="chargerMission('M2')">M2 : L'amateur Rouge</button>
            <button onclick="chargerMission('M3')">M3 : ft. Belzebuth</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div class="mission-header"><h1 id="mission-title">HUB TACTIQUE</h1></div>
        <div class="menu-list">
            <div class="btn-graphic" style="background-image: url('bouton_action.jpg');" onclick="show('screen-action-perso')"></div>
            <div class="btn-graphic" style="background-image: url('bouton_enigma.jpg');" onclick="show('screen-enigme')"></div>
        </div>
        <button class="secondary" onclick="show('screen-missions')">Quitter Mission</button>
    </div>

    <div id="screen-action-perso" class="screen">
        <div class="mission-header"><h1>ORDRE AGENT</h1></div>
        <div class="agent-avatar-container">
            <img id="agent-avatar" src="" style="display:none;">
            <div id="avatar-none" style="font-size: 1.5rem; color: var(--tactical-blue);">?</div>
        </div>
        <label>Agent</label><select id="sel-p" onchange="updateAgentVisuals()"></select>
        <label>Action</label><select id="sel-a" onchange="toggleItemSelect()"></select>
        <label>Cible</label><select id="sel-c-perso" onchange="resetItemUsed()"></select>
        <div id="container-item" style="display:none;">
            <label>Utiliser avec</label><select id="sel-item-used"></select>
        </div>
        <div id="res-perso" class="result-box">Transmission...</div>
        <button onclick="runActionPerso()">Transmettre</button>
        <button class="secondary" onclick="show('screen-menu')">Retour</button>
    </div>

    <div id="screen-enigme" class="screen">
        <div class="mission-header"><h1>MACHINE CRYPTO</h1></div>
        <label>Énigme active</label><select id="sel-eni" onchange="resetHintsForNewEnigma()"></select>
        <div class="code-container">
            <div class="wheel-wrapper"><select id="eni-1" class="select-color" style="background:var(--eni-yellow)"></select></div>
            <div class="wheel-wrapper"><select id="eni-2" class="select-color" style="background:var(--eni-blue); color:white"></select></div>
            <div class="wheel-wrapper"><select id="eni-3" class="select-color" style="background:var(--eni-green); color:white"></select></div>
            <div class="wheel-wrapper"><select id="eni-4" class="select-color" style="background:var(--eni-red); color:white"></select></div>
        </div>
        <button onclick="runEnigme()">Décoder</button>
        <div id="res-code-final" class="result-box">PRÊT</div>
        <button id="btn-next-hint" style="background:#1a2a36; color:var(--hint-gold); border:1px solid var(--hint-gold); margin-top:5px;" onclick="progressiveHint()">Indice 1</button>
        <div class="hint-scroll-area" id="hint-journal"></div>
        <button class="secondary" onclick="show('screen-menu')">Retour</button>
    </div>
</div>

<script>
    let timeLeft = 3600, alertLeft = 60, timerId = null, isPaused = true, isAlertActive = false, currentHintLevel = 1;
    let grille = [], grilleAC = [], grilleENI = [], sols = [], aideData = [];
    const alertSound = new Audio('alarm.wav'); // Préparation du son

    const persos = ["Banks", "Julia", "Kim", "Murphy", "Stacy"];
    const mapping = {
        "Banks": ["regarder", "Manipuler", "assommer", "Forcer"],
        "Julia": ["regarder", "Manipuler", "faufiler", "déverrouiller"],
        "Kim": ["regarder", "Manipuler", "acrobatie", "lancer"],
        "Murphy": ["regarder", "Manipuler", "soigner", "Médical"],
        "Stacy": ["regarder", "Manipuler", "pirater", "dynamiter"]
    };
    const actionsWithItems = ["Manipuler", "Forcer", "déverrouiller", "lancer", "soigner", "dynamiter"];

    function updateDisplay() {
        const d = document.getElementById('timer-display');
        let t = isAlertActive ? alertLeft : timeLeft;
        d.innerText = `${Math.floor(t/60).toString().padStart(2,'0')}:${(t%60).toString().padStart(2,'0')}`;
        d.classList.toggle('alert-mode', isAlertActive);
    }

    function toggleTimer() {
        if (isPaused) {
            isPaused = false; document.getElementById('btn-pause').innerText = "PAUSE";
            timerId = setInterval(() => {
                if(isAlertActive) {
                    if(alertLeft > 0) {
                        alertLeft--;
                    } else { 
                        alertSound.play(); // Le son retentit à 0
                        toggleAlerte(); 
                    }
                } else {
                    if(timeLeft > 0) timeLeft--;
                }
                updateDisplay();
            }, 1000);
        } else { isPaused = true; document.getElementById('btn-pause').innerText = "PLAY"; clearInterval(timerId); }
    }

    function toggleAlerte() {
        isAlertActive = !isAlertActive;
        alertLeft = 60;
        document.getElementById('btn-alert').classList.toggle('active', isAlertActive);
        updateDisplay();
    }

    function resetTimer() { timeLeft = 3600; alertLeft = 60; updateDisplay(); }

    async function chargerMission(id) {
        const fetchCSV = url => new Promise(r => Papa.parse(url, { download: true, complete: res => r(res.data), error: () => r([]) }));
        const d = await Promise.all([fetchCSV("grille.csv"), fetchCSV("grille_ac.csv"), fetchCSV(`grille_eni_${id}.csv`), fetchCSV(`solutions_${id}.csv`), fetchCSV(`indice_${id}.csv`)]);
        grille = d[0]; grilleAC = d[1]; grilleENI = d[2]; aideData = d[4];
        sols = d[3].map(r => ({ code: r[0]?.trim(), expert: r[1]?.trim().toUpperCase(), action: r[2]?.trim(), texte: r[3]?.trim() }));
        initMenus();
        document.getElementById('mission-title').innerText = "MISSION " + id;
        show('screen-menu');
    }

    function initMenus() {
        const sp = document.getElementById('sel-p'), sc = document.getElementById('sel-c-perso'), siu = document.getElementById('sel-item-used'), se = document.getElementById('sel-eni');
        sp.innerHTML = '<option value="">Agent</option>'; persos.forEach(p => sp.innerHTML += `<option value="${p}">${p}</option>`);
        sc.innerHTML = '<option value="">Cible</option>'; grille.forEach((l, i) => { if(i >= 2 && l[0]) sc.innerHTML += `<option value="${i}">${l[0]}</option>`; });
        siu.innerHTML = '<option value="">Aucun</option>'; grilleAC.forEach((l, i) => { if(i > 0 && l[0]) siu.innerHTML += `<option value="${i}">${l[0]}</option>`; });
        se.innerHTML = '<option value="">-- Enigme --</option>'; grilleENI.forEach(l => { if(l[0]) se.innerHTML += `<option value="${l[0]}">${l[0]}</option>`; });
        ['eni-1', 'eni-2', 'eni-3', 'eni-4'].forEach(id => {
            const el = document.getElementById(id); el.innerHTML = "";
            for(let i=0; i<=9; i++) el.innerHTML += `<option value="${i}">${i}</option>`;
        });
    }

    function updateAgentVisuals() {
        const p = document.getElementById('sel-p').value, img = document.getElementById('agent-avatar'), ph = document.getElementById('avatar-none'), sa = document.getElementById('sel-a');
        if (p) { img.src = `${p}.png`; img.style.display = 'block'; ph.style.display = 'none'; 
            sa.innerHTML = ''; mapping[p].forEach((act, i) => sa.innerHTML += `<option value="${i}">${act}</option>`);
            toggleItemSelect(); // Force la vérification de l'affichage objet au changement d'agent
        } else { img.style.display = 'none'; ph.style.display = 'block'; }
    }

    function toggleItemSelect() { 
        const actionMenu = document.getElementById('sel-a');
        const actionLabel = actionMenu.options[actionMenu.selectedIndex]?.text;
        const container = document.getElementById('container-item');
        
        // Sécurité : affiche le container seulement si l'action est dans la liste autorisée
        if (actionLabel && actionsWithItems.includes(actionLabel)) {
            container.style.display = "block";
        } else {
            container.style.display = "none";
            document.getElementById('sel-item-used').selectedIndex = 0; // Reset automatique
        }
    }

    function runActionPerso() {
        const pName = document.getElementById('sel-p').value, cIdx = document.getElementById('sel-c-perso').value, iIdx = document.getElementById('sel-item-used').value, sa = document.getElementById('sel-a'), res = document.getElementById('res-perso');
        if(!pName || !cIdx || !sa.options[sa.selectedIndex]) return;
        let actionIdx = parseInt(sa.value), actionLabel = sa.options[sa.selectedIndex].text, code = "";
        if(actionsWithItems.includes(actionLabel) && iIdx !== "0" && iIdx !== "") {
            const n1 = grille[cIdx][0].trim(), n2 = grilleAC[iIdx][0].trim();
            let rA = grilleAC.findIndex(r => r[0]?.trim() === n1), cA = grilleAC[0].findIndex(c => c?.trim() === n2);
            if(rA !== -1 && cA !== -1) code = grilleAC[rA][cA]?.trim();
            if(!code || code === "-") {
                let rB = grilleAC.findIndex(r => r[0]?.trim() === n2), cB = grilleAC[0].findIndex(c => c?.trim() === n1);
                if(rB !== -1 && cB !== -1) code = grilleAC[rB][cB]?.trim();
            }
        }
        if(!code || code === "-") {
            const col = 1 + (persos.indexOf(pName) * 4) + actionIdx;
            code = grille[cIdx][col]?.trim();
        }
        const agentInit = pName[0].toUpperCase();
        const match = sols.find(s => s.code === code && (s.expert === "" || s.expert === agentInit));
        if(match) {
            if (match.action && match.action.toLowerCase() !== actionLabel.toLowerCase()) {
                res.innerHTML = "Action inadaptée."; res.style.color = "var(--eni-red)";
            } else { res.innerHTML = match.texte; res.style.color = "white"; }
        } else { res.innerHTML = "Aucun résultat."; res.style.color = "var(--eni-red)"; }
    }

    function runEnigme() {
        const id = document.getElementById('sel-eni').value, res = document.getElementById('res-code-final');
        const saisi = ['eni-1','eni-2','eni-3','eni-4'].map(i => document.getElementById(i).value).join('');
        const row = grilleENI.find(r => r[0] == id);
        if(row && saisi === row[1]?.toString().trim()) {
            const s = sols.find(x => x.code === row[2]?.toString().trim());
            res.innerHTML = s ? s.texte : "CODE CORRECT"; res.style.color = "var(--eni-green)";
        } else { res.innerHTML = "ÉCHEC"; res.style.color = "var(--eni-red)"; }
    }

    function progressiveHint() {
        const id = document.getElementById('sel-eni').value, journal = document.getElementById('hint-journal'), btn = document.getElementById('btn-next-hint');
        const hint = aideData.find(r => r[0].trim() == id && r[1].trim() == currentHintLevel);
        if(hint) {
            const div = document.createElement('div'); div.className = 'hint-entry';
            div.innerHTML = `<div class="hint-label">${currentHintLevel === 3 ? "SOLUTION" : "INDICE "+currentHintLevel}</div>${hint[2]}`;
            journal.appendChild(div); journal.scrollTop = journal.scrollHeight;
            let pen = parseInt(hint[3]); if(!isNaN(pen)) { timeLeft -= (pen*60); updateDisplay(); }
            currentHintLevel++;
            if(currentHintLevel > 3) { btn.disabled = true; btn.innerText = "Fin de l'aide"; }
            else btn.innerText = currentHintLevel === 3 ? "Solution" : "Indice " + currentHintLevel;
        }
    }

    function resetItemUsed() { document.getElementById('sel-item-used').selectedIndex = 0; }
    function resetHintsForNewEnigma() { currentHintLevel = 1; document.getElementById('hint-journal').innerHTML = ""; document.getElementById('btn-next-hint').disabled = false; document.getElementById('btn-next-hint').innerText = "Indice 1"; }
    function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('mission-timer').style.display = (id === 'screen-missions') ? 'none' : 'flex'; }
</script>
</body>
</html>
