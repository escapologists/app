<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Escapologists - Tactical Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --primary: #20258C; --bg-petrol: #0a1118; --card: #0f1922; --text: #e0e0e0; 
            --tactical-blue: #3498db; --eni-yellow: #EBF099; --eni-blue: #2076B3; 
            --eni-green: #23991F; --eni-red: #C93110; --hint-gold: #D4AF37;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-petrol); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100dvh; margin: 0; overflow: hidden; }

        .app-container { width: 95%; max-width: 380px; height: 90%; background: var(--card); display: flex; flex-direction: column; position: relative; overflow: hidden; border: 2px solid var(--tactical-blue); border-radius: 20px; box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); box-sizing: border-box; }

        .timer-bar { background: rgba(0,0,0,0.7); padding: 12px 15px; display: none; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--tactical-blue); flex-shrink: 0; }
        #timer-display { font-family: 'Courier New', monospace; font-size: 1.5rem; color: var(--tactical-blue); font-weight: bold; }
        #timer-display.alert-mode { color: var(--eni-red); text-shadow: 0 0 10px var(--eni-red); }

        .timer-controls { display: flex; gap: 8px; }
        .timer-btn { background: #16212b; border: 1px solid #2c3e50; color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }
        .timer-btn#btn-alert.active { background: var(--eni-red); border-color: white; }

        .screen { display: none; flex-direction: column; height: 100%; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .screen.active { display: flex; }
        
        .mission-header { border: 2px solid var(--primary); border-radius: 15px; padding: 8px; margin-bottom: 15px; background: rgba(32, 37, 140, 0.2); text-align: center; }
        h1 { color: #fff; font-size: 0.9rem; text-transform: uppercase; margin: 0; }

        .menu-list { display: flex; flex-direction: column; gap: 15px; flex-grow: 1; justify-content: center; }
        .btn-graphic { width: 100%; height: 140px; background-size: cover; background-position: center; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
        
        button { padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; }
        button.secondary { background: #16212b; border: 1px solid #2c3e50; margin-top: auto; }

        label { font-size: 0.7rem; color: var(--tactical-blue); font-weight: bold; margin-bottom: 4px; text-transform: uppercase; display: block; margin-left: 5px; }
        select { padding: 10px; border-radius: 10px; background: #0a1118; color: white; border: 1px solid #2c3e50; margin-bottom: 10px; width: 100%; font-size: 0.9rem; }

        .agent-avatar-container { width: 80px; height: 80px; margin: 0 auto 10px auto; border-radius: 50%; border: 3px solid var(--primary); background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #agent-avatar { width: 100%; height: 100%; object-fit: cover; }

        .result-code { background: rgba(0,0,0,0.8); padding: 12px; border-radius: 10px; margin: 10px 0; border: 1px solid #1a2a36; color: #fff; text-align: center; font-weight: bold; font-size: 0.9rem; }
        
        .hint-scroll-area { background: rgba(0,0,0,0.4); border: 1px solid #1a2a36; border-radius: 10px; padding: 10px; flex-grow: 1; overflow-y: auto; margin-top: 10px; font-size: 0.8rem; }
        .hint-entry { border-left: 3px solid var(--hint-gold); padding-left: 10px; margin-bottom: 12px; }
        .hint-label { font-size: 0.6rem; color: var(--hint-gold); font-weight: bold; margin-bottom: 2px; }

        .code-container { display: flex; justify-content: space-between; margin: 10px 0; gap: 5px; }
        .wheel-wrapper { width: 23%; height: 60px; }
        .select-color { width: 100%; height: 100%; border-radius: 10px; font-size: 1.8rem; font-weight: 900; text-align-last: center; border: none; }
        .c-yellow { background: var(--eni-yellow); color: #2c3e50; }
        .c-blue { background: var(--eni-blue); color: #fff; }
        .c-green { background: var(--eni-green); color: #fff; }
        .c-red { background: var(--eni-red); color: #fff; }

        .btn-hint-main { background: #1a2a36; border: 1px solid var(--hint-gold); color: var(--hint-gold); width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="mission-timer" class="timer-bar">
        <div id="timer-display">60:00</div>
        <div class="timer-controls">
            <button id="btn-alert" class="timer-btn" onclick="toggleAlerte()">Alerte</button>
            <button class="timer-btn" onclick="toggleTimer()" id="btn-pause">Play</button>
            <button class="timer-btn" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <div id="screen-missions" class="screen active">
        <div class="mission-header"><h1>SÉLECTION MISSION</h1></div>
        <div class="menu-list">
            <button onclick="chargerMission('M1')">M1 : Le jardinier Armé</button>
            <button onclick="chargerMission('M2')">M2 : L'amateur Rouge</button>
            <button onclick="chargerMission('M3')">M3 : ft. Belzebuth</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div class="mission-header"><h1 id="mission-title">HUB TACTIQUE</h1></div>
        <div class="menu-list">
            <div class="btn-graphic" style="background-image: url('bouton_action.jpg');" onclick="show('screen-action-perso')"></div>
            <div class="btn-graphic" style="background-image: url('bouton_enigma.jpg');" onclick="show('screen-enigme')"></div>
        </div>
        <button class="secondary" onclick="show('screen-missions')">Retour</button>
    </div>

    <div id="screen-action-perso" class="screen">
        <div class="mission-header"><h1>ORDRES DE TERRAIN</h1></div>
        <div class="agent-avatar-container">
            <img id="agent-avatar" src="" style="display:none;">
            <div id="avatar-none" style="font-size: 2.5rem; color: var(--tactical-blue);">?</div>
        </div>
        <label>Agent</label><select id="sel-p" onchange="updateAgentVisuals()"></select>
        <label>Action</label><select id="sel-a" onchange="toggleItemSelect()"></select>
        <label>Cible</label><select id="sel-c-perso" onchange="resetItemUsed()"></select>
        <div id="container-item" style="display:none;">
            <label>Utiliser avec</label><select id="sel-item-used"></select>
        </div>
        <div id="res-perso" class="result-code">En attente...</div>
        <button onclick="runActionPerso()" style="margin-top:10px;">Exécuter</button>
        <button class="secondary" onclick="show('screen-menu')">Retour</button>
    </div>

    <div id="screen-enigme" class="screen">
        <div class="mission-header"><h1>MACHINE CRYPTO</h1></div>
        <label>Sélectionner l'énigme</label>
        <select id="sel-eni" onchange="resetHintsForNewEnigma()"></select>
        <div class="code-container">
            <div class="wheel-wrapper"><select id="eni-1" class="select-color c-yellow"></select></div>
            <div class="wheel-wrapper"><select id="eni-2" class="select-color c-blue"></select></div>
            <div class="wheel-wrapper"><select id="eni-3" class="select-color c-green"></select></div>
            <div class="wheel-wrapper"><select id="eni-4" class="select-color c-red"></select></div>
        </div>
        <button onclick="runEnigme()">Tester le code</button>
        <div id="res-code-final" class="result-code">SYSTÈME PRÊT</div>
        <button id="btn-next-hint" class="btn-hint-main" onclick="progressiveHint()">Demander Indice 1</button>
        <div class="hint-scroll-area" id="hint-journal">
            <div style="color:#555; text-align:center; font-style:italic;">Journal d'assistance vide.</div>
        </div>
        <button class="secondary" onclick="show('screen-menu')">Retour</button>
    </div>
</div>

<script>
    let timeLeft = 3600, alertLeft = 60, timerId = null, isPaused = true, isAlertActive = false, currentHintLevel = 1;
    let grille = [], grilleAC = [], grilleENI = [], sols = [], aideData = [];
    const persos = ["Banks", "Julia", "Kim", "Murphy", "Stacy"];
    const mapping = {
        "Banks": ["regarder", "Manipuler", "assommer", "Forcer"],
        "Julia": ["regarder", "Manipuler", "faufiler", "déverrouiller"],
        "Kim": ["regarder", "Manipuler", "acrobatie", "lancer"],
        "Murphy": ["regarder", "Manipuler", "soigner", "Médical"],
        "Stacy": ["regarder", "Manipuler", "pirater", "dynamiter"]
    };
    const actionsWithItems = ["Manipuler", "Forcer", "déverrouiller", "lancer", "soigner", "dynamiter"];

    function updateDisplay() {
        const d = document.getElementById('timer-display');
        let t = isAlertActive ? alertLeft : timeLeft;
        d.innerText = `${Math.floor(t/60).toString().padStart(2,'0')}:${(t%60).toString().padStart(2,'0')}`;
        if(isAlertActive) d.classList.add('alert-mode'); else d.classList.remove('alert-mode');
    }

    function toggleTimer() {
        if (isPaused) {
            isPaused = false; document.getElementById('btn-pause').innerText = "PAUSE";
            timerId = setInterval(() => { 
                if(!isAlertActive && timeLeft > 0) { timeLeft--; updateDisplay(); }
                if(isAlertActive && alertLeft > 0) { alertLeft--; updateDisplay(); }
            }, 1000);
        } else { isPaused = true; document.getElementById('btn-pause').innerText = "PLAY"; clearInterval(timerId); }
    }

    function toggleAlerte() {
        isAlertActive = !isAlertActive;
        if(isAlertActive) alertLeft = 60;
        document.getElementById('btn-alert').classList.toggle('active');
        updateDisplay();
    }

    function resetTimer() { timeLeft = 3600; alertLeft = 60; isAlertActive = false; updateDisplay(); }

    function fetchCSV(url) { return new Promise(r => Papa.parse(url, { download: true, complete: res => r(res.data), error: () => r([]) })); }

    async function chargerMission(id) {
        const data = await Promise.all([
            fetchCSV("grille.csv"), fetchCSV("grille_ac.csv"), 
            fetchCSV(`grille_eni_${id}.csv`), fetchCSV(`solutions_${id}.csv`),
            fetchCSV(`indice_${id}.csv`)
        ]);
        grille = data[0]; grilleAC = data[1]; grilleENI = data[2]; 
        sols = data[3].map(row => ({ code: row[0]?.trim(), expert: row[1]?.trim().toUpperCase(), action: row[2]?.trim(), texte: row[3]?.trim() }));
        aideData = data[4];
        initMenus();
        document.getElementById('mission-title').innerText = "MISSION " + id;
        show('screen-menu');
    }

    function initMenus() {
        const sp = document.getElementById('sel-p'), sc = document.getElementById('sel-c-perso'), siu = document.getElementById('sel-item-used'), se = document.getElementById('sel-eni');
        sp.innerHTML = '<option value="">Agent</option>'; persos.forEach(p => sp.innerHTML += `<option value="${p}">${p}</option>`);
        sc.innerHTML = '<option value="">Cible</option>'; grille.forEach((l, i) => { if(i >= 2 && l[0]) sc.innerHTML += `<option value="${i}">${l[0]}</option>`; });
        siu.innerHTML = '<option value="">Aucun</option>'; grilleAC.forEach((l, i) => { if(i > 0 && l[0]) siu.innerHTML += `<option value="${i}">${l[0]}</option>`; });
        se.innerHTML = '<option value="">-- Choisir Enigme --</option>'; grilleENI.forEach(l => { if(l[0]) se.innerHTML += `<option value="${l[0]}">${l[0]}</option>`; });
        ['eni-1', 'eni-2', 'eni-3', 'eni-4'].forEach(id => {
            const el = document.getElementById(id); el.innerHTML = "";
            for(let i=0; i<=9; i++) el.innerHTML += `<option value="${i}">${i}</option>`;
        });
    }

    function updateAgentVisuals() {
        const p = document.getElementById('sel-p').value, img = document.getElementById('agent-avatar'), ph = document.getElementById('avatar-none'), sa = document.getElementById('sel-a');
        if (p) { img.src = `${p}.png`; img.style.display = 'block'; ph.style.display = 'none'; 
            sa.innerHTML = ''; mapping[p].forEach((act, i) => sa.innerHTML += `<option value="${i}">${act}</option>`);
        } else { img.style.display = 'none'; ph.style.display = 'block'; }
    }

    function toggleItemSelect() {
        const sa = document.getElementById('sel-a'), cont = document.getElementById('container-item');
        cont.style.display = (sa.options[sa.selectedIndex] && actionsWithItems.includes(sa.options[sa.selectedIndex].text)) ? "block" : "none";
    }

    function resetItemUsed() { document.getElementById('sel-item-used').selectedIndex = 0; }

    function runActionPerso() {
        const agentName = document.getElementById('sel-p').value, obj1Idx = document.getElementById('sel-c-perso').value, obj2Idx = document.getElementById('sel-item-used').value, resBox = document.getElementById('res-perso'), sa = document.getElementById('sel-a');
        if(!agentName || !obj1Idx || !sa.options[sa.selectedIndex]) return;
        let actionLabel = sa.options[sa.selectedIndex].text, code = "";
        if(actionsWithItems.includes(actionLabel) && obj2Idx !== "0" && obj2Idx !== "") {
            const name1 = grille[obj1Idx][0].trim(), name2 = grilleAC[obj2Idx][0].trim();
            let rA = grilleAC.findIndex(r => r[0]?.trim() === name1), cA = grilleAC[0].findIndex(c => c?.trim() === name2);
            if(rA !== -1 && cA !== -1) code = grilleAC[rA][cA]?.trim();
        } 
        if (!code) {
            const agentIdx = persos.indexOf(agentName), colIndex = 1 + (agentIdx * 4) + parseInt(sa.value);
            code = grille[obj1Idx][colIndex]?.trim();
        }
        const agentInit = agentName[0].toUpperCase(), match = sols.find(s => s.code === code && (s.expert === "" || s.expert === agentInit));
        resBox.innerHTML = match ? match.texte : "Aucune interaction utile.";
    }

    function runEnigme() {
        const id = document.getElementById('sel-eni').value, res = document.getElementById('res-code-final');
        if(!id) return;
        const saisi = document.getElementById('eni-1').value + document.getElementById('eni-2').value + document.getElementById('eni-3').value + document.getElementById('eni-4').value;
        const row = grilleENI.find(r => r[0] == id);
        if(row && saisi === row[1]?.toString().trim()) {
            const s = sols.find(x => x.code === row[2]?.toString().trim());
            res.innerHTML = s ? s.texte : "SÉQUENCE VALIDÉE"; res.style.color = "var(--eni-green)";
        } else { res.innerHTML = "SÉQUENCE ERRONÉE"; res.style.color = "var(--eni-red)"; }
    }

    function progressiveHint() {
        const enigmaId = document.getElementById('sel-eni').value, journal = document.getElementById('hint-journal'), btn = document.getElementById('btn-next-hint');
        if(!enigmaId) return;
        const hint = aideData.find(r => r[0].trim() == enigmaId && r[1].trim() == currentHintLevel);
        if(hint) {
            if(currentHintLevel === 1) journal.innerHTML = "";
            const div = document.createElement('div'); div.className = 'hint-entry';
            div.innerHTML = `<div class="hint-label">${currentHintLevel === 3 ? "SOLUTION" : "INDICE "+currentHintLevel}</div><div>${hint[2]}</div>`;
            journal.appendChild(div); journal.scrollTop = journal.scrollHeight;
            const pen = parseInt(hint[3]); if(!isNaN(pen)) { timeLeft = Math.max(0, timeLeft - (pen * 60)); updateDisplay(); }
            currentHintLevel++;
            if(currentHintLevel > 3) { btn.innerText = "Fin de l'aide"; btn.disabled = true; }
            else { btn.innerText = currentHintLevel === 3 ? "Demander SOLUTION" : `Demander Indice ${currentHintLevel}`; }
        }
    }

    function resetHintsForNewEnigma() {
        currentHintLevel = 1; const btn = document.getElementById('btn-next-hint');
        btn.innerText = "Demander Indice 1"; btn.disabled = false;
        document.getElementById('hint-journal').innerHTML = '<div style="color:#555; text-align:center; font-style:italic;">Journal d\'assistance vide.</div>';
        document.getElementById('res-code-final').innerText = "SYSTÈME PRÊT";
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('mission-timer').style.display = (id === 'screen-missions') ? 'none' : 'flex';
    }

    window.onload = () => updateDisplay();
</script>
</body>
</html>
