<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Escapologists - Tactical Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --primary: #20258C; --bg-petrol: #0a1118; --card: #0f1922; --text: #e0e0e0; 
            --halo: rgba(32, 37, 140, 0.5); --eni-yellow: #EBF099; --eni-blue: #2076B3; 
            --eni-green: #23991F; --eni-red: #C93110; --hint-color: #419096;
            --tactical-blue: #3498db;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-petrol); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100dvh; 
            margin: 0; 
            overflow: hidden; 
            width: 100vw;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            box-sizing: border-box;
        }

        .app-container { 
            width: 100%; 
            max-width: 380px; 
            height: 100%; 
            background: var(--card); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden; 
            
            /* CADRE BLEU AVEC ANGLES ARRONDIS */
            border: 2px solid var(--tactical-blue);
            border-radius: 25px; /* Arrondissement des angles du cadre */
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.4);
            box-sizing: border-box;
        }

        /* Ajustements pour les grands écrans */
        @media (min-height: 750px) and (min-width: 500px) {
            .app-container {
                height: 92dvh;
                border-radius: 35px; /* Arrondi légèrement plus grand sur grand écran */
            }
        }

        .timer-bar { 
            background: rgba(0,0,0,0.4); 
            padding: 10px 15px; 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #1a2a36;
            flex-shrink: 0;
            /* Pour que le fond du timer suive l'arrondi du cadre en haut */
            border-top-left-radius: 23px;
            border-top-right-radius: 23px;
        }
        
        /* Ajustement de l'arrondi du timer sur grand écran */
        @media (min-height: 750px) and (min-width: 500px) {
            .timer-bar {
                border-top-left-radius: 33px;
                border-top-right-radius: 33px;
            }
        }

        #timer-display { font-family: monospace; font-size: 1.4rem; color: #3498db; font-weight: bold; letter-spacing: 2px; }
        #timer-display.danger { color: var(--eni-red); text-shadow: 0 0 10px var(--eni-red); animation: blink 1s infinite; }
        
        .timer-controls { display: flex; gap: 8px; }
        .timer-btn { background: #16212b; border: 1px solid #2c3e50; color: white; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; }

        .screen { 
            display: none; 
            flex-direction: column; 
            height: 100%; 
            padding: 15px 20px; 
            box-sizing: border-box; 
            animation: fadeIn 0.4s ease;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }
        .screen.active { display: flex; }

        .mission-header { border: 2px solid var(--primary); border-radius: 20px; padding: 8px 18px; margin: 0 auto 15px auto; box-shadow: 0 0 15px var(--halo); background: rgba(32, 37, 140, 0.1); flex-shrink: 0; }
        h1 { color: #fff; text-align: center; font-size: 1rem; text-transform: uppercase; margin: 0; letter-spacing: 2px; }

        .menu-list { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; justify-content: center; }
        
        .btn-graphic { 
            width: 100%; 
            height: 25dvh; 
            max-height: 130px;
            background-size: cover; 
            background-position: center; 
            border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
            cursor: pointer; 
            transition: 0.3s; 
            flex-shrink: 0;
        }

        button { padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; flex-shrink: 0; }
        button.secondary { background: #16212b; border: 1px solid #2c3e50; margin-top: auto; margin-bottom: 5px; }
        
        select { padding: 10px; border-radius: 10px; background: #0a1118; color: white; border: 1px solid #2c3e50; margin-bottom: 6px; width: 100%; outline: none; font-size: 1rem; }
        select:focus { font-size: 1rem; } 
        
        label { font-size: 0.6rem; color: #3498db; font-weight: bold; margin-bottom: 3px; text-transform: uppercase; display: block; }
        
        .result-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 12px; margin-top: 8px; border: 1px solid #1a2a36; min-height: 55px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.85rem; flex-shrink: 0; color: #bdc3c7; }

        .agent-avatar-container { width: 80px; height: 80px; margin: 0 auto 8px auto; border-radius: 50%; border: 2px solid var(--primary); background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; overflow: hidden; flex-shrink: 0; }
        #agent-avatar { width: 100%; height: 100%; object-fit: cover; display: none; }

        .code-container { display: flex; justify-content: space-between; margin: 8px 0; gap: 6px; flex-shrink: 0; }
        .wheel-wrapper { position: relative; width: 68px; height: 75px; }
        .select-color { width: 100%; height: 100%; border-radius: 12px; font-size: 1.8rem; font-weight: 900; appearance: none; text-align-last: center; border: none; }
        
        .c-yellow { background-color: var(--eni-yellow); color: #2c3e50; }
        .c-blue { background-color: var(--eni-blue); color: #fff; }
        .c-green { background-color: var(--eni-green); color: #fff; }
        .c-red { background-color: var(--eni-red); color: #fff; }
        
        .btn-hint { background: var(--hint-color); font-size: 0.7rem; margin-top: 8px; color: white; flex-shrink: 0; padding: 10px; }
        .hint-text { color: var(--hint-color); font-size: 0.8rem; margin: 8px 0; border-left: 2px solid var(--hint-color); padding-left: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="mission-timer" class="timer-bar">
        <div id="timer-display">60:00</div>
        <div class="timer-controls">
            <button class="timer-btn" onclick="toggleTimer()" id="btn-pause">PLAY</button>
            <button class="timer-btn" onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <div id="screen-splash" class="screen active" style="justify-content: center; align-items: center;">
        <img src="logo.jpg" style="width: 180px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
        <p style="letter-spacing: 4px; color: #3498db; font-size: 0.7rem; font-weight: bold; margin-top: 25px; animation: blink 2s infinite;">SYSTEM LOADING...</p>
    </div>

    <div id="screen-missions" class="screen">
        <div class="mission-header"><h1>SÉLECTION MISSION</h1></div>
        <div class="menu-list">
            <button onclick="chargerMission('M1')">M1 : Le jardinier Armé</button>
            <button onclick="chargerMission('M2')">M2 : L'amateur Rouge</button>
            <button onclick="chargerMission('M3')">M3 : ft. Belzebuth</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div class="mission-header"><h1 id="mission-title">MISSION</h1></div>
        <div class="menu-list">
            <button class="btn-graphic" style="background-image: url('bouton_action.jpg');" onclick="show('screen-action-perso')"></button>
            <button class="btn-graphic" style="background-image: url('bouton_enigma.jpg');" onclick="show('screen-enigme')"></button>
        </div>
        <button class="secondary" onclick="show('screen-missions')">Quitter la mission</button>
    </div>

    <div id="screen-action-perso" class="screen">
        <h1>Action Agent</h1>
        <div class="agent-avatar-container">
            <img id="agent-avatar" src="" alt="Agent">
            <div id="avatar-none" style="font-size: 2.2rem; color: #3498db; font-weight: bold;">?</div>
        </div>
        <label>Agent</label><select id="sel-p" onchange="updateAgentVisuals()"></select>
        <label>Action</label><select id="sel-a" onchange="toggleItemSelect()"></select>
        <label>Objet 1</label><select id="sel-c-perso" onchange="resetItemUsed()"></select>
        <div id="container-item" style="display:none;">
            <label>Associé à l'objet :</label><select id="sel-item-used"></select>
        </div>
        <div id="res-perso" class="result-box">En attente d'ordres...</div>
        <button onclick="runActionPerso()" style="margin-top:8px;">Exécuter</button>
        <button class="secondary" onclick="show('screen-menu')">Retour</button>
    </div>

    <div id="screen-enigme" class="screen">
        <h1>Cryptographie</h1>
        <label>ID Énigme</label><select id="sel-eni" onchange="resetHintDisplay()"></select>
        <div class="code-container">
            <div class="wheel-wrapper"><select id="eni-1" class="select-color c-yellow"></select></div>
            <div class="wheel-wrapper"><select id="eni-2" class="select-color c-blue"></select></div>
            <div class="wheel-wrapper"><select id="eni-3" class="select-color c-green"></select></div>
            <div class="wheel-wrapper"><select id="eni-4" class="select-color c-red"></select></div>
        </div>
        <div id="res-enigme" class="result-box">Saisissez la séquence.</div>
        <button onclick="runEnigme()" style="margin-top:8px;">Décoder</button>
        <div id="hint-display" class="hint-text" style="display:none;"></div>
        <button id="btn-reveal-hint" class="btn-hint" onclick="revealNextHint()">CHOISISSEZ UNE ÉNIGME</button>
        <button class="secondary" onclick="show('screen-menu')">Retour</button>
    </div>
</div>

<script>
    let grille = [], grilleAC = [], grilleENI = [], sols = [], indices = [];
    const persos = ["Banks", "Julia", "Kim", "Murphy", "Stacy"];
    const mapping = {
        "Banks": ["regarder", "Manipuler", "assommer", "Forcer"],
        "Julia": ["regarder", "Manipuler", "faufiler", "déverrouiller"],
        "Kim": ["regarder", "Manipuler", "acrobatie", "lancer"],
        "Murphy": ["regarder", "Manipuler", "soigner", "Médical"],
        "Stacy": ["regarder", "Manipuler", "pirater", "dynamiter"]
    };
    const actionsWithItems = ["Manipuler", "Forcer", "déverrouiller", "lancer", "soigner", "dynamiter"];

    let timeLeft = 3600, timerId = null, isPaused = true, currentHintLevel = 0;
    const sndClick = new Audio('click.wav'), sndSuccess = new Audio('success.wav'), sndError = new Audio('error.wav');
    function playSnd(s) { s.currentTime = 0; s.play().catch(() => {}); }

    window.onload = () => { initCodeDropdowns(); setTimeout(() => { show('screen-missions'); }, 2000); };

    function updateTimerDisplay() {
        const display = document.getElementById('timer-display');
        const m = Math.max(0, Math.floor(timeLeft / 60)), s = Math.max(0, timeLeft % 60);
        display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        if (timeLeft < 300) display.classList.add('danger'); else display.classList.remove('danger');
    }

    function toggleTimer() {
        const btn = document.getElementById('btn-pause');
        if (isPaused) { isPaused = false; btn.innerText = "PAUSE"; timerId = setInterval(() => { timeLeft--; updateTimerDisplay(); if(timeLeft<=0) clearInterval(timerId); }, 1000); }
        else { isPaused = true; btn.innerText = "PLAY"; clearInterval(timerId); }
    }

    function resetTimer() { clearInterval(timerId); isPaused = true; timeLeft = 3600; updateTimerDisplay(); document.getElementById('btn-pause').innerText = "PLAY"; }

    function initCodeDropdowns() {
        ['eni-1', 'eni-2', 'eni-3', 'eni-4'].forEach(id => {
            const s = document.getElementById(id);
            for(let i=0; i<=9; i++) { let opt = document.createElement('option'); opt.value = i; opt.text = i; s.appendChild(opt); }
        });
    }

    function fetchCSV(url) { return new Promise((resolve) => { Papa.parse(url, { download: true, complete: (r) => resolve(r.data), error: () => resolve([]) }); }); }

    function chargerMission(id) {
        Promise.all([fetchCSV("grille.csv"), fetchCSV("grille_ac.csv"), fetchCSV(`grille_eni_${id}.csv`), fetchCSV(`solutions_${id}.csv`), fetchCSV(`indice_${id}.csv`)])
        .then(res => {
            grille = res[0]; grilleAC = res[1]; grilleENI = res[2]; indices = res[4]; sols = [];
            res[3].forEach(row => { if(row[0]) sols.push({ code: row[0].trim(), expert: row[1] ? row[1].trim().toUpperCase() : "", action: row[2] ? row[2].trim() : "", texte: row[3] ? row[3].trim() : "" }); });
            document.getElementById('mission-title').innerText = { "M1": "Le jardinier Armé", "M2": "L'amateur Rouge", "M3": "ft. Belzebuth" }[id] || "MISSION";
            initMenus(); show('screen-menu');
        });
    }

    function initMenus() {
        const sp = document.getElementById('sel-p'), scP = document.getElementById('sel-c-perso'), siu = document.getElementById('sel-item-used'), sen = document.getElementById('sel-eni');
        sp.innerHTML = '<option value="">-- Agent --</option>';
        persos.forEach(p => sp.innerHTML += `<option value="${p}">${p}</option>`);
        let optC = '<option value="">-- Objet 1 --</option>';
        grille.forEach((l, i) => { if(i >= 2 && l[0]) optC += `<option value="${i}">${formaterNom(l[0])}</option>`; });
        scP.innerHTML = optC;
        let optObj = '<option value="">-- Aucun objet --</option>';
        grilleAC.forEach((l, i) => { if(i > 0 && l[0]) optObj += `<option value="${i}">${formaterNom(l[0])}</option>`; });
        siu.innerHTML = optObj;
        let optEni = '<option value="">-- Énigme --</option>';
        grilleENI.forEach(l => { if(l[0]) optEni += `<option value="${l[0]}">${l[0]}</option>`; });
        sen.innerHTML = optEni;
    }

    function formaterNom(v) { v = v.trim(); if(!isNaN(v)) return "Objet " + v; if(v.startsWith('P')) return "Porte " + v.substring(1); return v; }

    function updateAgentVisuals() {
        const name = document.getElementById('sel-p').value, img = document.getElementById('agent-avatar'), ph = document.getElementById('avatar-none');
        if (name) { img.src = `${name}.png`; img.style.display = 'block'; ph.style.display = 'none'; }
        else { img.style.display = 'none'; ph.style.display = 'block'; }
        updateA();
    }

    function updateA() {
        const p = document.getElementById('sel-p').value, sa = document.getElementById('sel-a');
        if(!p) return;
        const lastAct = sa.options[sa.selectedIndex] ? sa.options[sa.selectedIndex].text : "regarder";
        sa.innerHTML = '';
        mapping[p].forEach((act, i) => { let opt = document.createElement('option'); opt.value = i; opt.text = act; sa.appendChild(opt); });
        for (let i = 0; i < sa.options.length; i++) { if (sa.options[i].text === lastAct) { sa.selectedIndex = i; break; } }
        resetItemUsed(); toggleItemSelect();
    }

    function toggleItemSelect() {
        const sa = document.getElementById('sel-a'), cont = document.getElementById('container-item');
        cont.style.display = (sa.options[sa.selectedIndex] && actionsWithItems.includes(sa.options[sa.selectedIndex].text)) ? "block" : "none";
    }

    function resetItemUsed() { const siu = document.getElementById('sel-item-used'); if(siu) siu.selectedIndex = 0; }

    function runActionPerso() {
        const agentName = document.getElementById('sel-p').value, obj1Idx = document.getElementById('sel-c-perso').value, obj2Idx = document.getElementById('sel-item-used').value, resBox = document.getElementById('res-perso');
        const sa = document.getElementById('sel-a');
        if(!agentName || !obj1Idx || !sa.options[sa.selectedIndex]) return;
        
        const actionLabel = sa.options[sa.selectedIndex].text;
        let code = "";

        if(actionsWithItems.includes(actionLabel) && obj2Idx !== "0" && obj2Idx !== "") {
            const name1 = grille[obj1Idx][0].trim(), name2 = grilleAC[obj2Idx][0].trim();
            let rA = grilleAC.findIndex(r => r[0] && r[0].trim() === name1), cA = grilleAC[0].findIndex(c => c && c.trim() === name2);
            if(rA !== -1 && cA !== -1) code = grilleAC[rA][cA]?.trim();
            if(!code) {
                let rB = grilleAC.findIndex(r => r[0] && r[0].trim() === name2), cB = grilleAC[0].findIndex(c => c && c.trim() === name1);
                if(rB !== -1 && cB !== -1) code = grilleAC[rB][cB]?.trim();
            }
        } 
        if (!code) {
            const agentIdx = persos.indexOf(agentName);
            const colIndex = 1 + (agentIdx * 4) + parseInt(sa.value);
            code = grille[obj1Idx][colIndex]?.trim();
        }

        const agentInit = { "Banks": "B", "Murphy": "M", "Stacy": "S", "Kim": "K", "Julia": "J" }[agentName];
        const match = sols.find(s => s.code === code && (s.expert === "" || s.expert === agentInit) && (s.action === "" || s.action.toLowerCase() === actionLabel.toLowerCase()));

        if(match) { resBox.innerHTML = match.texte; playSnd(sndSuccess); }
        else { resBox.innerHTML = code ? "Action ou agent inadapté." : "Rien ne se passe."; playSnd(sndError); }
    }

    function resetHintDisplay() { currentHintLevel = 0; document.getElementById('hint-display').innerHTML = ""; document.getElementById('hint-display').style.display = 'none'; updateHintButtonLabel(); }
    function updateHintButtonLabel() {
        const id = document.getElementById('sel-eni').value, btn = document.getElementById('btn-reveal-hint');
        if (!id) { btn.innerText = "CHOISISSEZ UNE ÉNIGME"; return; }
        const nl = currentHintLevel + 1;
        const h = indices.find(r => r[0] == id && r[1] == nl);
        btn.innerText = (nl > 3) ? "PLUS D'AIDE" : (h ? `RÉVÉLER AIDE ${nl} (-${h[3]}MN)` : "NON DISPO");
    }
    function revealNextHint() {
        const id = document.getElementById('sel-eni').value; if (!id || currentHintLevel >= 3) return;
        currentHintLevel++; const h = indices.find(r => r[0] == id && r[1] == currentHintLevel);
        if (h) { timeLeft -= (parseInt(h[3]) || 0) * 60; updateTimerDisplay(); const d = document.getElementById('hint-display'); d.innerHTML += `<div><strong>Aide ${currentHintLevel}:</strong> ${h[2]}</div>`; d.style.display = 'block'; updateHintButtonLabel(); playSnd(sndClick); }
    }
    function runEnigme() {
        const id = document.getElementById('sel-eni').value, res = document.getElementById('res-enigme'); if(!id) return;
        const saisi = document.getElementById('eni-1').value + document.getElementById('eni-2').value + document.getElementById('eni-3').value + document.getElementById('eni-4').value;
        const row = grilleENI.find(r => r[0] == id);
        if(row && saisi === row[1].toString().trim()) { const s = sols.find(x => x.code === row[2].toString().trim()); res.innerHTML = s ? s.texte : "Séquence correcte."; playSnd(sndSuccess); }
        else { res.innerHTML = "Échec du décodage."; playSnd(sndError); }
    }
    function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('mission-timer').style.display = (id === 'screen-splash' || id === 'screen-missions') ? 'none' : 'flex'; }
</script>
</body>
</html>
