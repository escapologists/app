<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Escapologists - Tactical Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Kalam:wght@700&display=swap');

        :root { 
            --primary: #C93110; 
            --ink-black: #1a1a1a;
            --comic-yellow: #EBF099;
            --paper-tint: rgba(245, 230, 211, 0.9);
            --alert-red: #ff0000;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: url('Fond70.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0; 
            overflow: hidden; 
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container { 
            width: 95%; 
            max-width: 380px; 
            height: 92%; 
            background: var(--paper-tint);
            border: 4px solid var(--ink-black);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
        }

        .mission-header { 
            background: var(--primary);
            border-bottom: 4px solid var(--ink-black);
            padding: 12px;
            transform: rotate(-1deg);
            margin: -5px -5px 15px -5px;
            z-index: 10;
        }

        h1 { 
            font-family: 'Bangers', cursive;
            font-size: 1.8rem; 
            margin: 0; 
            color: white;
            text-shadow: 3px 3px 0px var(--ink-black);
            text-transform: uppercase;
            text-align: center;
        }

        /* TIMER & ALERTE */
        .timer-bar { 
            background: var(--comic-yellow);
            border-bottom: 3px solid var(--ink-black);
            padding: 8px 12px;
            display: none;
            justify-content: space-between;
            align-items: center;
        }

        #timer-display { 
            font-family: 'Bangers', cursive;
            font-size: 2.2rem; 
            color: var(--ink-black);
        }
        #timer-display.alert-active { color: var(--alert-red); animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .timer-controls { display: flex; gap: 5px; }
        .timer-btn { 
            background: var(--ink-black); 
            color: white; 
            font-family: 'Bangers'; 
            border: 2px solid white; 
            padding: 5px 8px; 
            cursor: pointer;
            font-size: 0.8rem;
        }
        .timer-btn.btn-alert { background: var(--primary); }

        /* BOUTONS GRAPHIQUES MENU */
        .menu-list { display: flex; flex-direction: column; gap: 15px; padding: 10px; }
        .btn-comic-tile {
            width: 100%;
            height: 140px;
            border: 4px solid var(--ink-black);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            position: relative;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn-comic-tile:active { transform: translate(3px, 3px); box-shadow: 3px 3px 0px rgba(0,0,0,0.2); }
        .btn-label {
            position: absolute; bottom: 0; right: 0; background: var(--comic-yellow);
            padding: 5px 10px; font-family: 'Bangers'; border-top: 3px solid var(--ink-black);
            border-left: 3px solid var(--ink-black); font-size: 1.2rem;
        }

        /* SCREENS & BUTTONS */
        .screen { display: none; flex-direction: column; height: 100%; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .screen.active { display: flex; }

        button { 
            font-family: 'Bangers', cursive;
            padding: 12px; 
            border: 3px solid var(--ink-black);
            background: var(--primary); 
            color: white; 
            font-size: 1.3rem;
            cursor: pointer; 
            text-transform: uppercase;
            margin-bottom: 12px;
            box-shadow: 4px 4px 0px var(--ink-black);
        }

        button.secondary { background: #3498db; font-size: 1rem; }

        label { font-family: 'Kalam', cursive; font-size: 0.9rem; color: var(--ink-black); font-weight: bold; margin-bottom: 2px; display: block; }
        select { font-family: 'Kalam', cursive; padding: 8px; border: 2px solid var(--ink-black); background: white; width: 100%; margin-bottom: 10px; }

        /* AGENT AVATAR FIX */
        .agent-avatar-container { 
            width: 120px; height: 120px; 
            border: 4px solid var(--ink-black);
            background: white;
            margin: 0 auto 15px auto;
            overflow: hidden;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1);
        }
        #agent-avatar { width: 100%; height: 100%; object-fit: cover; display: block; }

        .result-box { 
            background: white;
            border: 3px solid var(--ink-black);
            padding: 12px;
            border-radius: 15px;
            margin: 10px 0;
            font-family: 'Kalam', cursive;
            min-height: 50px;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
    </style>
</head>
<body>

<div id="splash-screen">
    <img src="logo.jpg" style="width: 220px; border: 4px solid black; margin-bottom: 20px;">
    <h2 style="font-family:'Bangers'; color:var(--primary); font-size:2rem;">CHARGEMENT...</h2>
</div>

<div class="app-container">
    <div id="mission-timer" class="timer-bar">
        <div id="timer-display">60:00</div>
        <div class="timer-controls">
            <button class="timer-btn btn-alert" onclick="triggerAlert()">ALERTE</button>
            <button class="timer-btn" onclick="toggleTimer()" id="btn-pause">PLAY</button>
            <button class="timer-btn" onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <div id="screen-missions" class="screen active">
        <div class="mission-header"><h1>The Escapologists</h1></div>
        <button onclick="chargerMission('M1')">M1 : Le jardinier Armé</button>
        <button onclick="chargerMission('M2')">M2 : L'amateur Rouge</button>
        <button onclick="chargerMission('M3')">M3 : ft. Belzebuth</button>
    </div>

    <div id="screen-menu" class="screen">
        <div class="mission-header"><h1>HUB TACTIQUE</h1></div>
        <div class="menu-list">
            <div class="btn-comic-tile" style="background-image: url('bouton_action.jpg');" onclick="show('screen-action-perso')">
                <div class="btn-label">ORDRE AGENT</div>
            </div>
            <div class="btn-comic-tile" style="background-image: url('bouton_enigma.jpg');" onclick="show('screen-enigme')">
                <div class="btn-label">MACHINE CRYPTO</div>
            </div>
        </div>
        <button class="secondary" style="margin-top:auto;" onclick="show('screen-missions')">QUITTER</button>
    </div>

    <div id="screen-action-perso" class="screen">
        <div class="mission-header"><h1>ACTION</h1></div>
        <div class="agent-avatar-container">
            <img id="agent-avatar" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        </div>
        <label>AGENT</label><select id="sel-p" onchange="updateAgentVisuals()"></select>
        <label>ACTION</label><select id="sel-a" onchange="toggleItemSelect()"></select>
        <label>CIBLE</label><select id="sel-c-perso" onchange="resetItemUsed()"></select>
        <div id="container-item" style="display:none;">
            <label>AVEC OBJET</label><select id="sel-item-used"></select>
        </div>
        <div id="res-perso" class="result-box">Transmission...</div>
        <button onclick="runActionPerso()">TRANSMETTRE</button>
        <button class="secondary" onclick="show('screen-menu')">RETOUR</button>
    </div>

    <div id="screen-enigme" class="screen">
        <div class="mission-header"><h1>CRYPTO</h1></div>
        <label>ENIGME</label><select id="sel-eni" onchange="resetHintsForNewEnigma()"></select>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <select id="eni-1" style="background:var(--comic-yellow)"></select>
            <select id="eni-2" style="background:#3498db; color:white"></select>
            <select id="eni-3" style="background:#23991F; color:white"></select>
            <select id="eni-4" style="background:var(--primary); color:white"></select>
        </div>
        <button onclick="runEnigme()">DECODER</button>
        <div id="res-code-final" class="result-box">PRET</div>
        <button id="btn-next-hint" style="background:var(--comic-yellow); color:black;" onclick="progressiveHint()">INDICE ?</button>
        <button class="secondary" onclick="show('screen-menu')">RETOUR</button>
    </div>
</div>

<script>
    let timeLeft = 3600, alertLeft = 60, timerId = null, isPaused = true, isAlert = false;
    let grille = [], grilleAC = [], grilleENI = [], sols = [], aideData = [];
    const persos = ["Banks", "Julia", "Kim", "Murphy", "Stacy"];
    const mapping = {
        "Banks": ["regarder", "Manipuler", "assommer", "Forcer"],
        "Julia": ["regarder", "Manipuler", "faufiler", "déverrouiller"],
        "Kim": ["regarder", "Manipuler", "acrobatie", "lancer"],
        "Murphy": ["regarder", "Manipuler", "soigner", "Médical"],
        "Stacy": ["regarder", "Manipuler", "pirater", "dynamiter"]
    };

    window.onload = function() {
        setTimeout(() => { document.getElementById('splash-screen').style.display='none'; }, 1500);
    };

    function updateDisplay() {
        const d = document.getElementById('timer-display');
        let t = isAlert ? alertLeft : timeLeft;
        d.innerText = `${Math.floor(t/60).toString().padStart(2,'0')}:${(t%60).toString().padStart(2,'0')}`;
        d.classList.toggle('alert-active', isAlert);
    }

    function triggerAlert() {
        if(!isAlert) { isAlert = true; alertLeft = 60; } 
        else { isAlert = false; }
        updateDisplay();
    }

    function toggleTimer() {
        if (isPaused) {
            isPaused = false; document.getElementById('btn-pause').innerText = "PAUSE";
            timerId = setInterval(() => {
                if(isAlert) { if(alertLeft > 0) alertLeft--; else isAlert = false; }
                else { if(timeLeft > 0) timeLeft--; }
                updateDisplay();
            }, 1000);
        } else { isPaused = true; document.getElementById('btn-pause').innerText = "PLAY"; clearInterval(timerId); }
    }

    function resetTimer() { timeLeft = 3600; alertLeft = 60; isAlert = false; updateDisplay(); }

    async function chargerMission(id) {
        const v = "?v=" + Date.now();
        const fetchCSV = url => new Promise(r => Papa.parse(url + v, { download: true, complete: res => r(res.data), error: () => r([]) }));
        const d = await Promise.all([fetchCSV("grille.csv"), fetchCSV("grille_ac.csv"), fetchCSV(`grille_eni_${id}.csv`), fetchCSV(`solutions_${id}.csv`), fetchCSV(`indice_${id}.csv`)]);
        grille = d[0]; grilleAC = d[1]; grilleENI = d[2]; aideData = d[4];
        sols = d[3].map(r => ({ code: r[0]?.trim(), expert: r[1]?.trim().toUpperCase(), action: r[2]?.trim(), texte: r[3]?.trim() }));
        initMenus();
        show('screen-menu');
    }

    function initMenus() {
        const sp = document.getElementById('sel-p'), sc = document.getElementById('sel-c-perso'), siu = document.getElementById('sel-item-used'), se = document.getElementById('sel-eni');
        sp.innerHTML = '<option value="">AGENT</option>'; persos.forEach(p => sp.innerHTML += `<option value="${p}">${p}</option>`);
        sc.innerHTML = '<option value="">CIBLE</option>'; grille.forEach((l, i) => { if(i >= 2 && l[0]) sc.innerHTML += `<option value="${i}">${l[0]}</option>`; });
        siu.innerHTML = '<option value="0">AUCUN</option>'; grilleAC.forEach((l, i) => { if(i > 0 && l[0]) siu.innerHTML += `<option value="${i}">${l[0]}</option>`; });
        se.innerHTML = '<option value="">-- ENIGME --</option>'; grilleENI.forEach(l => { if(l[0]) se.innerHTML += `<option value="${l[0]}">${l[0]}</option>`; });
        ['eni-1','eni-2','eni-3','eni-4'].forEach(id => { 
            let e = document.getElementById(id); e.innerHTML = "";
            for(let i=0; i<=9; i++) e.innerHTML += `<option value="${i}">${i}</option>`;
        });
    }

    function updateAgentVisuals() {
        const p = document.getElementById('sel-p').value, img = document.getElementById('agent-avatar'), sa = document.getElementById('sel-a');
        if (p) { 
            img.src = `${p}.png`;
            sa.innerHTML = ''; mapping[p].forEach((act, i) => sa.innerHTML += `<option value="${i}">${act}</option>`);
            toggleItemSelect();
        }
    }

    function toggleItemSelect() { 
        const aLabel = document.getElementById('sel-a').options[document.getElementById('sel-a').selectedIndex]?.text;
        document.getElementById('container-item').style.display = (aLabel && !["regarder", "Manipuler"].includes(aLabel)) ? "block" : (aLabel === "Manipuler" ? "block" : "none");
    }

    function runActionPerso() {
        const pName = document.getElementById('sel-p').value, cIdx = document.getElementById('sel-c-perso').value, iIdx = document.getElementById('sel-item-used').value, sa = document.getElementById('sel-a'), res = document.getElementById('res-perso');
        if(!pName || !cIdx) return;
        let actionLabel = sa.options[sa.selectedIndex].text, code = "";

        if(iIdx !== "0" && iIdx !== "") {
            const nomC = grille[cIdx][0].trim(), nomO = grilleAC[iIdx][0].trim();
            let r1 = grilleAC.findIndex(r => r[0]?.trim() === nomC), c1 = grilleAC[0].findIndex(c => c?.trim() === nomO);
            let found = (r1 !== -1 && c1 !== -1) ? grilleAC[r1][c1]?.trim() : "";
            if(!found || found === "-") {
                let r2 = grilleAC.findIndex(r => r[0]?.trim() === nomO), c2 = grilleAC[0].findIndex(c => c?.trim() === nomC);
                found = (r2 !== -1 && c2 !== -1) ? grilleAC[r2][c2]?.trim() : "";
            }
            code = found;
        } else {
            code = grille[cIdx][1 + (persos.indexOf(pName) * 4) + parseInt(sa.value)]?.trim();
        }

        const match = sols.find(s => s.code === code && (s.expert === "" || s.expert === pName[0].toUpperCase()));
        res.innerHTML = match ? (match.action && match.action.toLowerCase() !== actionLabel.toLowerCase() ? "Action inadaptée." : match.texte) : "Aucun effet.";
    }

    function runEnigme() {
        const id = document.getElementById('sel-eni').value, res = document.getElementById('res-code-final'), saisi = ['eni-1','eni-2','eni-3','eni-4'].map(i => document.getElementById(i).value).join('');
        const row = grilleENI.find(r => r[0] == id);
        if(row && saisi === row[1]?.toString().trim()) {
            const s = sols.find(x => x.code === row[2]?.toString().trim());
            res.innerHTML = s ? s.texte : "DECODAGE REUSSI";
        } else res.innerHTML = "CODE ERRONE";
    }

    function show(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
        document.getElementById('mission-timer').style.display = (id === 'screen-missions') ? 'none' : 'flex'; 
    }
    
    function resetItemUsed() { document.getElementById('sel-item-used').selectedIndex = 0; }
    function resetHintsForNewEnigma() { document.getElementById('res-code-final').innerText = "PRET"; }
    function progressiveHint() { alert("Consultez vos documents pour les indices."); }
</script>
</body>
</html>
