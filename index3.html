<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Escapologists - Tactical Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Kalam:wght@700&display=swap');

        :root { 
            --primary: #C93110; 
            --ink-black: #1a1a1a;
            --comic-yellow: #EBF099;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: url('fond_comic.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0; 
            overflow: hidden; 
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container { 
            width: 90%; 
            max-width: 360px; 
            height: 92%; 
            background: transparent; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
        }

        .mission-header { 
            background: var(--primary);
            border: 3px solid var(--ink-black);
            padding: 6px;
            transform: rotate(-1deg);
            margin: 5px 5px 15px 5px;
            z-index: 10;
            box-shadow: 4px 4px 0px var(--ink-black);
        }

        h1 { 
            font-family: 'Bangers', cursive;
            font-size: 1.4rem; 
            margin: 0; 
            color: white;
            text-shadow: 2px 2px 0px var(--ink-black);
            text-transform: uppercase;
            text-align: center;
        }

        .timer-bar { 
            background: var(--comic-yellow);
            border: 3px solid var(--ink-black);
            padding: 5px 12px;
            margin: 0 10px;
            display: none;
            justify-content: space-between;
            align-items: center;
        }

        #timer-display { font-family: 'Bangers', cursive; font-size: 1.8rem; }

        .screen { display: none; flex-direction: column; height: 100%; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .screen.active { display: flex; }

        button { 
            font-family: 'Bangers', cursive; padding: 12px; 
            border: 3px solid var(--ink-black); background: var(--primary); 
            color: white; font-size: 1.1rem; cursor: pointer; 
            text-transform: uppercase; margin-bottom: 10px;
            box-shadow: 4px 4px 0px var(--ink-black);
        }

        button.secondary { background: #3498db; }
        button.hint-btn { background: #f39c12; font-size: 0.9rem; margin-top: 5px; }

        .result-box { 
            background: rgba(255, 255, 255, 0.9); border: 3px solid var(--ink-black);
            padding: 12px; margin: 10px 0; font-family: 'Kalam', cursive;
            min-height: 50px; text-align: center; display: flex;
            align-items: center; justify-content: center;
            white-space: pre-line;
        }

        select { 
            font-family: 'Kalam', cursive; padding: 8px; border: 3px solid var(--ink-black); 
            width: 100%; margin-bottom: 10px; background: rgba(255,255,255,0.8);
        }
        
        .menu-list { display: flex; flex-direction: column; gap: 15px; padding: 20px; }
        .btn-comic-tile {
            width: 100%; height: 140px; border: 4px solid var(--ink-black);
            background-size: cover; background-position: center; position: relative;
        }
        .btn-label {
            position: absolute; bottom: -5px; right: -5px; background: var(--comic-yellow);
            padding: 4px 12px; font-family: 'Bangers'; border: 3px solid var(--ink-black);
            font-size: 1.2rem; transform: rotate(-2deg);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="mission-timer" class="timer-bar">
        <div id="timer-display">60:00</div>
        <button style="padding:2px 8px; font-size:0.7rem;" onclick="toggleTimer()" id="btn-pause">PLAY</button>
    </div>

    <!-- Écran Missions -->
    <div id="screen-missions" class="screen active">
        <div class="mission-header"><h1>The Escapologists</h1></div>
        <button onclick="chargerMission('M1')">M1 : Le jardinier Armé</button>
        <button onclick="chargerMission('M2')">M2 : L'amateur Rouge</button>
        <button onclick="chargerMission('M3')">M3 : ft. Belzebuth</button>
    </div>

    <!-- Menu Hub -->
    <div id="screen-menu" class="screen">
        <div class="mission-header"><h1>HUB TACTIQUE</h1></div>
        <div class="menu-list">
            <div class="btn-comic-tile" style="background-image: url('bouton_action.jpg');" onclick="show('screen-action-perso')">
                <div class="btn-label">ORDRE AGENT</div>
            </div>
            <div class="btn-comic-tile" style="background-image: url('bouton_enigma.jpg');" onclick="show('screen-enigme')">
                <div class="btn-label">MACHINE CRYPTO</div>
            </div>
        </div>
        <button class="secondary" onclick="show('screen-missions')">QUITTER</button>
    </div>

    <!-- Écran Énigme -->
    <div id="screen-enigme" class="screen">
        <div class="mission-header"><h1>DECRYPTAGE</h1></div>
        <label>CHOIX ENIGME</label><select id="sel-eni" onchange="resetHints()"></select>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <select id="eni-1"></select><select id="eni-2"></select>
            <select id="eni-3"></select><select id="eni-4"></select>
        </div>
        <button onclick="runEnigme()">DECODER</button>
        <button id="btn-hint" class="hint-btn" onclick="getHint()">BESOIN D'UN INDICE ?</button>
        <div id="res-code-final" class="result-box">SCANNER PRET</div>
        <button class="secondary" onclick="show('screen-menu')">RETOUR</button>
    </div>
</div>

<script>
    let timeLeft = 3600, timerId = null, isPaused = true;
    let currentMission = "", indiceLevel = 0;
    let grilleENI = [], sols = [], indicesCSV = [];

    function toggleTimer() {
        if (isPaused) {
            isPaused = false; document.getElementById('btn-pause').innerText = "PAUSE";
            timerId = setInterval(() => { if(timeLeft > 0) { timeLeft--; updateDisplay(); } }, 1000);
        } else { isPaused = true; document.getElementById('btn-pause').innerText = "PLAY"; clearInterval(timerId); }
    }

    function updateDisplay() {
        const d = document.getElementById('timer-display');
        d.innerText = `${Math.floor(timeLeft/60).toString().padStart(2,'0')}:${(timeLeft%60).toString().padStart(2,'0')}`;
    }

    async function chargerMission(id) {
        currentMission = id;
        const v = "?v=" + Date.now();
        const fetchCSV = url => new Promise(r => Papa.parse(url + v, { download: true, complete: res => r(res.data), error: () => r([]) }));
        
        const d = await Promise.all([
            fetchCSV(`grille_eni_${id}.csv`), 
            fetchCSV(`solutions_${id}.csv`), 
            fetchCSV(`indice_${id}.csv`)
        ]);

        grilleENI = d[0];
        sols = d[1].map(r => ({ code: r[0]?.trim(), texte: r[3]?.trim() }));
        indicesCSV = d[2];
        
        initEnigmeMenu();
        show('screen-menu');
    }

    function initEnigmeMenu() {
        const se = document.getElementById('sel-eni');
        se.innerHTML = '<option value="">-- ENIGME --</option>';
        grilleENI.forEach(l => { if(l[0]) se.innerHTML += `<option value="${l[0]}">${l[0]}</option>`; });
        ['eni-1','eni-2','eni-3','eni-4'].forEach(id => { 
            let e = document.getElementById(id); e.innerHTML = "";
            for(let i=0; i<=9; i++) e.innerHTML += `<option value="${i}">${i}</option>`;
        });
    }

    function getHint() {
        const idEni = document.getElementById('sel-eni').value;
        const resBox = document.getElementById('res-code-final');
        if(!idEni) return;

        // On filtre toutes les lignes du CSV qui concernent cette énigme
        const rows = indicesCSV.filter(r => r[0] == idEni);
        if(rows.length === 0) return;

        // On cherche la ligne correspondant au niveau d'indice actuel + 1
        const nextLevel = indiceLevel + 1;
        const hintRow = rows.find(r => r[1] == nextLevel);

        if(hintRow) {
            indiceLevel = nextLevel;
            
            // Décompte du temps (Col 4)
            const penalite = parseInt(hintRow[3]) || 0;
            timeLeft = Math.max(0, timeLeft - (penalite * 60));
            updateDisplay();

            // Affichage cumulé (Col 3)
            let currentContent = (indiceLevel === 1) ? "" : resBox.innerText + "\n---\n";
            resBox.innerText = currentContent + hintRow[2];
        }
    }

    function resetHints() {
        indiceLevel = 0;
        document.getElementById('res-code-final').innerText = "SCANNER PRET";
    }

    function runEnigme() {
        const id = document.getElementById('sel-eni').value;
        const res = document.getElementById('res-code-final');
        const saisi = ['eni-1','eni-2','eni-3','eni-4'].map(i => document.getElementById(i).value).join('');
        const row = grilleENI.find(r => r[0] == id);
        
        if(row && saisi === row[1]?.toString().trim()) {
            const s = sols.find(x => x.code === row[2]?.toString().trim());
            res.innerHTML = s ? s.texte : "ACCÈS AUTORISÉ";
        } else {
            res.innerHTML = "CODE INCORRECT";
        }
    }

    function show(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
        document.getElementById('mission-timer').style.display = (id === 'screen-missions') ? 'none' : 'flex'; 
    }
</script>
</body>
</html>
